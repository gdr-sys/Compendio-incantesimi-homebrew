<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio Homebrew Definitivo</title>
    <style>
        :root[data-theme="light"] {
            --primary: #8b0000; --bg: #f4ece1; --card-bg: #fffdfa;
            --text: #332b21; --accent: #bc9a70; --form-bg: #e9decb; --pin-bg: #d4c4a8;
        }
        :root[data-theme="dark"] {
            --primary: #ff4d4d; --bg: #1a1a1a; --card-bg: #2d2d2d;
            --text: #e0e0e0; --accent: #5d4a36; --form-bg: #3d3d3d; --pin-bg: #4a3f35;
        }
        body { font-family: 'Palatino', serif; background-color: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; scroll-behavior: smooth; }
        .container { max-width: 1000px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 10px; }
        
        /* Pin Panel */
        .pin-panel { background: var(--pin-bg); padding: 15px; border-radius: 8px; border: 1px dashed var(--primary); margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .pin-tag { background: var(--card-bg); padding: 5px 12px; border-radius: 20px; margin: 4px; display: inline-block; border: 1px solid var(--primary); cursor: pointer; font-size: 0.85em; transition: 0.2s; }
        .pin-tag:hover { background: var(--primary); color: white; }

        /* Form Layout */
        .spell-form { background: var(--form-bg); padding: 25px; border-radius: 8px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .full-width { grid-column: 1 / -1; }
        input, select, textarea { padding: 10px; border: 1px solid var(--accent); border-radius: 4px; background: var(--card-bg); color: var(--text); font-family: inherit; width: 100%; box-sizing: border-box; }
        
        /* Image Preview with X */
        .img-preview-container { position: relative; display: inline-block; margin-top: 10px; }
        .img-preview { max-width: 200px; border-radius: 4px; border: 2px solid var(--accent); }
        .btn-remove-img { position: absolute; top: -10px; right: -10px; background: #f44336; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* Toggle Buttons */
        .toggle-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-top: 10px; }
        .toggle-btn { background: var(--card-bg); border: 1px solid var(--accent); padding: 8px; border-radius: 4px; cursor: pointer; text-align: center; font-size: 0.85em; transition: 0.2s; user-select: none; }
        .toggle-btn.selected { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }

        /* Collapsible Sections */
        .filter-section { background: var(--form-bg); border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--accent); overflow: hidden; }
        .filter-trigger { padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; background: var(--accent); color: white; }
        .filter-content { padding: 15px; display: none; }
        .filter-content.open { display: block; }
        
        /* Cards & Highlight */
        .spell-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .spell-card { background: var(--card-bg); border: 1px solid var(--accent); border-left: 8px solid var(--primary); padding: 20px; border-radius: 4px; position: relative; transition: all 0.4s ease; }
        .spell-card.highlight { transform: scale(1.05); box-shadow: 0 0 25px #ffd700; border-color: #ffd700; z-index: 50; }
        .spell-img { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; margin-bottom: 12px; }
        
        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 10px 15px; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📖 Grimorio Master</h1>
        <div style="display:flex; gap:10px;">
            <button onclick="exportData()" class="btn" style="background:#4a90e2; color:white;">Export</button>
            <button onclick="document.getElementById('importFile').click()" class="btn" style="background:#7ed321; color:white;">Import</button>
            <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            <button onclick="toggleTheme()" class="btn btn-main">🌓</button>
        </div>
    </header>

    <div class="pin-panel" id="pinPanel" style="display:none">
        <strong>📌 Incantesimi Memorizzati:</strong> <div id="pinnedContainer"></div>
    </div>

    <!-- FORM DI CREAZIONE -->
    <section class="spell-form">
        <input type="hidden" id="editId">
        <input type="text" id="nameIta" placeholder="Nome Italiano">
        <input type="text" id="nameEng" placeholder="Nome Inglese">
        
        <select id="level">
            <option value="0">Trucchetto</option>
            <script>for(let i=1;i<=9;i++) document.write(`<option value="${i}">${i}° Livello</option>`)</script>
        </select>

        <select id="school">
            <option>Abiurazione</option><option>Ammaliamento</option><option>Divinazione</option><option>Evocazione</option>
            <option>Illusione</option><option>Invocazione</option><option>Necromanzia</option><option>Trasmutazione</option>
        </select>

        <input type="text" id="castingTime" placeholder="Tempo di lancio">
        <input type="text" id="range" placeholder="Gittata">
        <input type="text" id="duration" placeholder="Durata">

        <!-- TOGGLE RITUALE / CONCENTRAZIONE / COMPONENTI -->
        <div class="full-width" style="display:flex; gap:15px; background:rgba(0,0,0,0.05); padding:10px; border-radius:4px; flex-wrap: wrap;">
            <label><input type="checkbox" id="isRitual"> 🕯️ Rituale</label>
            <label><input type="checkbox" id="isConc"> 🧠 Concentrazione</label>
            <label><input type="checkbox" id="compV"> V</label>
            <label><input type="checkbox" id="compS"> S</label>
            <label><input type="checkbox" id="compM" onchange="document.getElementById('matIn').classList.toggle('hidden', !this.checked)"> M</label>
        </div>
        <div id="matIn" class="full-width hidden">
            <input type="text" id="materialDesc" placeholder="Descrizione materiali necessari...">
        </div>

        <div class="full-width">
            <label>Classi:</label>
            <div id="createClassGrid" class="toggle-grid"></div>
        </div>

        <textarea id="effectDesc" class="full-width" rows="4" placeholder="Descrizione dell'effetto..."></textarea>
        <textarea id="higherLevels" class="full-width" rows="2" placeholder="Ai livelli più alti..."></textarea>
        
        <div class="full-width">
            <label>Immagine Illustrativa:</label>
            <input type="file" id="imgInput" onchange="handleImg(event)">
            <div id="imgPreviewWrapper" class="hidden">
                <div class="img-preview-container">
                    <img id="imgPreview" src="" class="img-preview">
                    <button class="btn-remove-img" title="Rimuovi Immagine" onclick="removeImg()">X</button>
                </div>
            </div>
        </div>

        <button onclick="saveSpell()" class="btn btn-main full-width" id="btnSave">📜 Salva nel Grimorio</button>
    </section>

    <!-- FILTRI COLLASSABILI -->
    <div class="filter-section">
        <div class="filter-trigger" onclick="toggleAccordion('fSearch')">🔍 Cerca per Nome <span>▼</span></div>
        <div id="fSearch" class="filter-content open">
            <input type="text" id="searchBar" placeholder="Digita il nome..." onkeyup="render()">
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-trigger" onclick="toggleAccordion('fLevel')">📊 Filtra Livelli <span>▼</span></div>
        <div id="fLevel" class="filter-content">
            <div id="filterLevelGrid" class="toggle-grid">
                <div class="toggle-btn" data-val="0" onclick="handleFilterClick(this, 'levels')">Trucchetto</div>
                <script>for(let i=1;i<=9;i++) document.write(`<div class="toggle-btn" data-val="${i}" onclick="handleFilterClick(this, 'levels')">Lvl ${i}</div>`)</script>
            </div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-trigger" onclick="toggleAccordion('fClass')">🛡️ Filtra Classi <span>▼</span></div>
        <div id="fClass" class="filter-content">
            <div id="filterClassGrid" class="toggle-grid"></div>
        </div>
    </div>

    <!-- LISTA INCANTESIMI -->
    <div id="spellList" class="spell-grid"></div>
</div>

<script>
    let spells = JSON.parse(localStorage.getItem('grim_master_v1')) || [];
    let pinnedIds = JSON.parse(localStorage.getItem('grim_master_pins')) || [];
    let currentImg = "";
    let filterState = { levels: [], classes: [] };
    const CLASSES = ["Artificiere", "Bardo", "Chierico", "Druido", "Guerriero (E.K.)", "Ladro (A.T.)", "Mago", "Paladino", "Ranger", "Stregone", "Warlock"];

    function toggleTheme() {
        const root = document.documentElement;
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function toggleAccordion(id) { document.getElementById(id).classList.toggle('open'); }

    function handleImg(e) {
        const reader = new FileReader();
        reader.onload = () => { currentImg = reader.result; showImgPreview(currentImg); };
        if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
    }

    function showImgPreview(src) {
        const wrapper = document.getElementById('imgPreviewWrapper');
        const img = document.getElementById('imgPreview');
        if(src) { img.src = src; wrapper.classList.remove('hidden'); }
        else { wrapper.classList.add('hidden'); }
    }

    function removeImg() {
        currentImg = "";
        document.getElementById('imgInput').value = "";
        showImgPreview("");
    }

    function handleFilterClick(el, type) {
        const val = el.getAttribute('data-val');
        el.classList.toggle('selected');
        if (el.classList.contains('selected')) filterState[type].push(val);
        else filterState[type] = filterState[type].filter(item => item !== val);
        render();
    }

    function focusSpell(id) {
        const card = document.getElementById(`spell-${id}`);
        if(card) {
            const yOffset = -150; 
            const y = card.getBoundingClientRect().top + window.pageYOffset + yOffset;
            window.scrollTo({top: y, behavior: 'smooth'});
            card.classList.add('highlight');
            setTimeout(() => card.classList.remove('highlight'), 2000);
        }
    }

    function saveSpell() {
        const id = document.getElementById('editId').value ? parseInt(document.getElementById('editId').value) : Date.now();
        const selClasses = Array.from(document.querySelectorAll('#createClassGrid .toggle-btn.selected')).map(b => b.getAttribute('data-val'));
        const data = {
            id,
            nameIta: document.getElementById('nameIta').value,
            nameEng: document.getElementById('nameEng').value,
            level: document.getElementById('level').value,
            school: document.getElementById('school').value,
            ritual: document.getElementById('isRitual').checked,
            conc: document.getElementById('isConc').checked,
            cast: document.getElementById('castingTime').value,
            range: document.getElementById('range').value,
            duration: document.getElementById('duration').value,
            comp: { v: document.getElementById('compV').checked, s: document.getElementById('compS').checked, m: document.getElementById('compM').checked },
            mats: document.getElementById('materialDesc').value,
            classes: selClasses,
            effect: document.getElementById('effectDesc').value,
            higher: document.getElementById('higherLevels').value,
            image: currentImg
        };
        if(!data.nameIta) return alert("Inserisci almeno il nome!");
        const idx = spells.findIndex(x => x.id === id);
        if(idx > -1) spells[idx] = data; else spells.push(data);
        localStorage.setItem('grim_master_v1', JSON.stringify(spells));
        location.reload();
    }

    function render() {
        const list = document.getElementById('spellList');
        const query = document.getElementById('searchBar').value.toLowerCase();
        
        const pinned = spells.filter(s => pinnedIds.includes(s.id));
        document.getElementById('pinPanel').style.display = pinned.length ? 'block' : 'none';
        document.getElementById('pinnedContainer').innerHTML = pinned.map(s => `
            <span class="pin-tag" onclick="focusSpell(${s.id})">${s.nameIta}</span>
        `).join('');

        list.innerHTML = '';
        spells.filter(s => {
            const matchSearch = s.nameIta.toLowerCase().includes(query) || s.nameEng.toLowerCase().includes(query);
            const matchLevel = filterState.levels.length === 0 || filterState.levels.includes(s.level.toString());
            const matchClass = filterState.classes.length === 0 || s.classes.some(c => filterState.classes.includes(c));
            return matchSearch && matchLevel && matchClass;
        }).forEach(s => {
            const isPinned = pinnedIds.includes(s.id);
            list.innerHTML += `
                <div class="spell-card" id="spell-${s.id}">
                    <button onclick="togglePin(${s.id})" style="position:absolute; top:10px; right:10px; background:none; border:none; cursor:pointer; font-size:1.5em;">${isPinned ? '📌' : '📍'}</button>
                    ${s.image ? `<img src="${s.image}" class="spell-img">` : ''}
                    <h3 style="margin:0;">${s.nameIta}</h3>
                    <small><i>${s.nameEng}</i></small>
                    <div style="font-size:0.85em; margin:10px 0;">
                        <b>${s.level == 0 ? 'Trucchetto' : s.level + '° Livello'} ${s.school}</b> ${s.ritual ? '(Rituale)' : ''}<br>
                        <b>Lancio:</b> ${s.cast} | <b>Durata:</b> ${s.conc ? 'Conc. ' : ''}${s.duration}<br>
                        <b>Componenti:</b> ${[s.comp.v?'V':'', s.comp.s?'S':'', s.comp.m?'M':''].filter(Boolean).join(', ')}
                        ${s.comp.m ? `<br><i>(${s.mats})</i>` : ''}
                    </div>
                    <p style="font-size:0.9em; white-space:pre-wrap; border-top: 1px solid var(--accent); padding-top:10px;">${s.effect}</p>
                    ${s.higher ? `<p style="font-size:0.85em; font-style:italic; opacity:0.8;"><b>Livelli Superiori:</b> ${s.higher}</p>` : ''}
                    <div style="display:flex; gap:5px; margin-top:15px;">
                        <button onclick="editSpell(${s.id})" class="btn" style="flex:1; background:#ff9800; color:white;">Modifica</button>
                        <button onclick="deleteSpell(${s.id})" class="btn" style="flex:1; background:#f44336; color:white;">Elimina</button>
                    </div>
                </div>`;
        });
    }

    function togglePin(id) {
        pinnedIds = pinnedIds.includes(id) ? pinnedIds.filter(i => i !== id) : [...pinnedIds, id];
        localStorage.setItem('grim_master_pins', JSON.stringify(pinnedIds));
        render();
    }

    function editSpell(id) {
        const s = spells.find(x => x.id === id);
        document.getElementById('editId').value = s.id;
        document.getElementById('nameIta').value = s.nameIta;
        document.getElementById('nameEng').value = s.nameEng;
        document.getElementById('level').value = s.level;
        document.getElementById('school').value = s.school;
        document.getElementById('isRitual').checked = s.ritual;
        document.getElementById('isConc').checked = s.conc;
        document.getElementById('castingTime').value = s.cast;
        document.getElementById('range').value = s.range;
        document.getElementById('duration').value = s.duration;
        document.getElementById('compV').checked = s.comp.v;
        document.getElementById('compS').checked = s.comp.s;
        document.getElementById('compM').checked = s.comp.m;
        document.getElementById('materialDesc').value = s.mats;
        document.getElementById('matIn').classList.toggle('hidden', !s.comp.m);
        document.getElementById('effectDesc').value = s.effect;
        document.getElementById('higherLevels').value = s.higher || "";
        
        document.querySelectorAll('#createClassGrid .toggle-btn').forEach(b => {
            b.classList.toggle('selected', s.classes.includes(b.getAttribute('data-val')));
        });
        currentImg = s.image || "";
        showImgPreview(currentImg);
        window.scrollTo({top: 0, behavior: 'smooth'});
        document.getElementById('btnSave').innerText = "💾 Aggiorna Incantesimo";
    }

    function deleteSpell(id) { if(confirm("Eliminare definitivamente?")) { spells = spells.filter(s => s.id !== id); localStorage.setItem('grim_master_v1', JSON.stringify(spells)); render(); } }

    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(spells)]));
        a.download = 'grimorio_export.json';
        a.click();
    }

    function importData(e) {
        const r = new FileReader();
        r.onload = (ev) => { spells = JSON.parse(ev.target.result); localStorage.setItem('grim_master_v1', JSON.stringify(spells)); render(); };
        r.readAsText(e.target.files[0]);
    }

    // Init Griglie Classi
    ['createClassGrid', 'filterClassGrid'].forEach(gid => {
        const c = document.getElementById(gid);
        CLASSES.forEach(cl => {
            const click = gid.includes('create') ? "this.classList.toggle('selected')" : "handleFilterClick(this, 'classes')";
            c.innerHTML += `<div class="toggle-btn" data-val="${cl}" onclick="${click}">${cl}</div>`;
        });
    });

    render();
</script>
</body>
</html>
