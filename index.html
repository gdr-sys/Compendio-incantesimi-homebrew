o", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "una piuma bianca o il cuore di una gallina", "classi": ["Bardo", "Mago", "Stregone", "Warlock"], "descrizione": "L'incantatore proietta un'immagine visiva delle peggiori paure dei bersagli. Ogni creatura nel cono deve superare un TS su Saggezza o lasciar cadere ciò che tiene in mano e diventare spaventata. Finché è spaventata, la creatura deve usare l'azione di Scatto per allontanarsi dall'incantatore lungo il percorso più breve.", "livelli_superiori": ""}, {"id": "srd_presagio", "nome": "Presagio", "livello": 2, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 minuto (rituale)", "gittata": "Personale", "durata": "Istantanea", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "bastoncini, ossa o carte del valore di 25 mo [cite: 418]", "classi": ["Chierico", "Druido", "Mago"], "descrizione": "L'incantatore riceve un presagio su un corso d'azione che intende intraprendere entro i prossimi 30 minuti. Il GM sceglie tra: Bene, Male, Bene e Male, o Nessun risultato particolare[cite: 418, 419].", "livelli_superiori": ""}, {"id": "srd_protezione_dal_bene_e_dal_male", "nome": "Protezione dal Bene e dal Male", "livello": 1, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "acqua santa o polvere d'argento e ferro", "classi": ["Chierico", "Paladino", "Warlock", "Mago"], "descrizione": "Una creatura toccata è protetta contro aberrazioni, celestiali, elementali, folletti, immondi e non morti. Tali creature hanno svantaggio ai tiri per colpire contro il bersaglio, e il bersaglio non può essere affascinato, spaventato o posseduto da esse.", "livelli_superiori": ""}, {"id": "srd_protezione_dall_energia", "nome": "Protezione dall'Energia", "livello": 3, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico", "Druido", "Ranger", "Mago", "Stregone"], "descrizione": "Una creatura toccata ottiene resistenza a un tipo di danno a scelta tra: acido, freddo, fuoco, fulmine o tuono.", "livelli_superiori": ""}, {"id": "srd_purificare_cibo_e_bevande", "nome": "Purificare Cibo e Bevande", "livello": 1, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione (rituale)", "gittata": "3 metri", "durata": "Istantanea", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico", "Druido", "Paladino"], "descrizione": "L'incantatore rimuove veleno e marciume da cibi e bevande non magici in una sfera di 1,5 metri di raggio[cite: 430].", "livelli_superiori": ""}, {"id": "srd_quadro_mentale", "nome": "Quadro Mentale (Scrutare)", "livello": 5, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "10 minuti", "gittata": "Personale", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un focus del valore di almeno 1.000 mo (specchio d'argento o sfera di cristallo)", "classi": ["Bardo", "Chierico", "Druido", "Mago", "Stregone"], "descrizione": "L'incantatore può vedere e sentire una creatura a scelta che si trovi sul suo stesso piano. Il bersaglio deve effettuare un TS su Saggezza, modificato da quanto bene l'incantatore lo conosce e dalla sua connessione fisica.", "livelli_superiori": ""}, {"id": "srd_raggio_di_affaticamento", "nome": "Raggio di Affaticamento", "livello": 2, "edizione": "2024", "scuola": "Necromanzia", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Mago", "Warlock"], "descrizione": "Un raggio di energia scaturisce verso una creatura. Il bersaglio deve effettuare un TS su Costituzione: se fallisce, subisce svantaggio alle prove basate sulla Forza e sottrae 1d8 dai suoi tiri per i danni. Se riesce, subisce solo svantaggio al suo prossimo tiro per colpire fino all'inizio del turno successivo dell'incantatore.", "livelli_superiori": "I danni aumentano di 1d6 per ogni livello dello slot sopra il 2º."}, {"id": "srd_raggio_di_gelo", "nome": "Raggio di Gelo", "livello": 0, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Mago", "Stregone"], "descrizione": "Un raggio gelido di luce colpisce una creatura. L'incantatore effettua un attacco a distanza con incantesimo: se colpisce, il bersaglio subisce 1d8 danni da freddo e la sua velocità è ridotta di 3 metri fino all'inizio del turno successivo dell'incantatore.", "livelli_superiori": "I danni aumentano di 1d8 ai livelli 5 (2d8), 11 (3d8) e 17 (4d8)."}, {"id": "srd_rigenerazione", "nome": "Rigenerazione", "livello": 7, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 minuto", "gittata": "Contatto", "durata": "1 ora", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "una ruota della preghiera", "classi": ["Bardo", "Chierico", "Druido"], "descrizione": "Una creatura toccata recupera 4d8 + 15 punti ferita. Per la durata, il bersaglio recupera 1 punto ferita all'inizio di ogni suo turno e qualsiasi parte del corpo recisa ricresce dopo 2 minuti.", "livelli_superiori": ""}, {"id": "srd_rimuovi_maledizione", "nome": "Rimuovi Maledizione", "livello": 3, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico", "Mago", "Paladino", "Warlock"], "descrizione": "Tutte le maledizioni che affliggono una creatura o un oggetto terminano. Per un oggetto magico maledetto, la maledizione rimane ma l'incantesimo spezza la sintonia del proprietario col bene.", "livelli_superiori": ""}, {"id": "srd_rinascita", "nome": "Rinascita (Revivify)", "livello": 3, "edizione": "2024", "scuola": "Necromanzia", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un diamante del valore di almeno 300 mo, consumato dall'incantesimo", "classi": ["Chierico", "Druido", "Paladino", "Ranger"], "descrizione": "L'incantatore tocca una creatura morta nell'ultimo minuto. La creatura torna in vita con 1 punto ferita. Non può riparare organi o arti mancanti.", "livelli_superiori": ""}, {"id": "srd_riparare", "nome": "Riparare", "livello": 0, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 minuto", "gittata": "Contatto", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "due calamite", "classi": ["Bardo", "Chierico", "Druido", "Mago", "Stregone"], "descrizione": "Ripara una singola crepa o squarcio (massimo 30 cm) in un oggetto toccato. Può riparare fisicamente un oggetto magico, ma non ne ripristina la magia.", "livelli_superiori": ""}, {"id": "srd_riposo_inviolato", "nome": "Riposo Inviolato", "livello": 2, "edizione": "2024", "scuola": "Necromanzia", "tempo_lancio": "1 azione (rituale)", "gittata": "Contatto", "durata": "10 giorni", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "2 monete di rame, consumate dall'incantesimo", "classi": ["Chierico", "Mago", "Paladino"], "descrizione": "Protegge un cadavere dalla decomposizione e impedisce che diventi un non morto. Estende il limite di tempo per gli incantesimi di rianimazione.", "livelli_superiori": ""}, {"id": "srd_risata_incontenibile", "nome": "Risata Incontenibile (di Tasha)", "livello": 1, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "una crostata e una piuma", "classi": ["Bardo", "Mago", "Warlock"], "descrizione": "Una creatura che fallisce un TS su Saggezza cade a terra prona, diventando incapacitata e incapace di rialzarsi dalle risate. Il bersaglio ripete il TS alla fine di ogni turno e ogni volta che subisce danni.", "livelli_superiori": ""}, {"id": "srd_scagliare_maledizione", "nome": "Scagliare Maledizione", "livello": 3, "edizione": "2024", "scuola": "Necromanzia", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Chierico", "Mago"], "descrizione": "Toccando una creatura, l'incantatore le infligge una maledizione (TS Saggezza). Gli effetti includono svantaggio alle prove di una caratteristica, svantaggio ai tiri contro l'incantatore, o perdita dell'azione in cambio di Schivata.", "livelli_superiori": "Con slot di 4º livello la durata è 10 min. Dal 5º livello in su non richiede concentrazione e dura 8 ore o più."}, {"id": "srd_scritto_illusorio", "nome": "Scritto Illusorio", "livello": 1, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 minuto (rituale)", "gittata": "Contatto", "durata": "10 giorni", "rituale": true, "concentrazione": false, "comp": {"v": false, "s": true, "m": true}, "materiali": "inchiostro del valore di almeno 10 mo, consumato", "classi": ["Bardo", "Mago", "Warlock"], "descrizione": "L'incantatore scriv ti effetti: Paura, Sonno o Malessere (svantaggio a tiri e prove).", "livelli_superiori": ""}, {"id": "srd_suggestione", "nome": "Suggestione", "livello": 2, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "Concentrazione, fino a 8 ore", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": false, "m": true}, "materiali": "una lingua di serpente e un po' di favo o una goccia d'olio dolce", "classi": ["Bardo", "Mago", "Stregone", "Warlock"], "description": "L'incantatore suggerisce un corso d'azione (limitato a una o due frasi) a una creatura. Se il bersaglio fallisce un TS su Saggezza, segue il suggerimento al meglio delle sue capacità. L'azione suggerita deve sembrare ragionevole e non autolesionista.", "livelli_superiori": ""}, {"id": "srd_tempesta_di_fuoco", "nome": "Tempesta di Fuoco", "livello": 7, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "45 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico", "Druido", "Stregone"], "description": "Una tempesta di fiamme ruggenti investe un'area composta da un massimo di dieci cubi con spigolo di 3 metri, disposti come l'incantatore preferisce. Ogni creatura nell'area deve effettuare un TS su Destrezza: subisce 7d10 danni da fuoco se fallisce, o la metà se riesce.", "livelli_superiori": ""}, {"id": "srd_trasmutare_roccia", "nome": "Trasmutare Roccia", "livello": 5, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "argilla e sabbia", "classi": ["Druido", "Mago"], "description": "L'incantatore trasforma la roccia non magica in fango o viceversa in un cubo con spigolo di 12 metri. Il fango rallenta le creature e può intrappolarle, mentre il fango _di_verita", "nome": "Zona di Verità", "livello": 2, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "10 minuti", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Chierico", "Paladino"], "description": "L'incantatore crea una zona magica in una sfera di 4,5 metri di raggio. Ogni creatura che entra nell'area o vi inizia il turno deve superare un TS su Carisma o essere impossibilitata a mentire deliberatamente finché resta nella zona.", "livelli_superiori": ""}];

    let spells = JSON.parse(localStorage.getItem('grim_master_v1')) || [];
    let pinnedIds = JSON.parse(localStorage.getItem('grim_master_pins')) || [];
    let currentImg = "";
    let filterState = { levels: [], classes: [], editions: [] };
    let CLASSES = JSON.parse(localStorage.getItem('grim_custom_classes')) || ["Artificiere", "Bardo", "Chierico", "Druido", "Mago", "Paladino", "Ranger", "Stregone", "Warlock"];

    // === AUTOCOMPLETE SRD ===
    function handleNameInput(val) {
        const list = document.getElementById('acList');
        if (!val || val.length < 2) { list.style.display = 'none'; return; }
        const q = val.toLowerCase();
        const matches = SRD_SPELLS.filter(s => s.nome.toLowerCase().includes(q)).slice(0, 10);
        if (matches.length === 0) { list.style.display = 'none'; return; }
        list.innerHTML = matches.map(s => `
            <div class="autocomplete-item" onclick="fillFromSRD('${s.id.replace(/'/g, "\'")}')">
                ${s.nome} <span class="ac-edition">${s.edizione}</span>
            </div>`).join('');
        list.style.display = 'block';
    }

    function fillFromSRD(id) {
        const s = SRD_SPELLS.find(x => x.id === id);
        if (!s) return;
        document.getElementById('nameIta').value = s.nome;
        document.getElementById('nameEng').value = s.nome; // SRD non ha traduzione separata
        document.getElementById('edition').value = s.edizione;
        document.getElementById('level').value = s.livello;
        document.getElementById('school').value = s.scuola;
        document.getElementById('castingTime').value = s.tempo_lancio;
        document.getElementById('range').value = s.gittata;
        document.getElementById('duration').value = s.durata;
        document.getElementById('isRitual').checked = s.rituale;
        document.getElementById('isConc').checked = s.concentrazione;
        document.getElementById('compV').checked = s.comp.v;
        document.getElementById('compS').checked = s.comp.s;
        document.getElementById('compM').checked = s.comp.m;
        document.getElementById('materialDesc').value = s.materiali || '';
        document.getElementById('matIn').classList.toggle('hidden', !s.comp.m);
        document.getElementById('effectDesc').value = s.descrizione;
        document.getElementById('higherLevels').value = s.livelli_superiori || '';
        // Seleziona classi
        document.querySelectorAll('#createClassGrid .toggle-btn').forEach(b => {
            b.classList.toggle('selected', (s.classi || []).includes(b.getAttribute('data-val')));
        });
        document.getElementById('acList').style.display = 'none';
    }

    // Chiudi autocomplete cliccando fuori — mousedown non blocca i click sui bottoni
    document.addEventListener('mousedown', (e) => {
        if (!e.target.closest('.autocomplete-wrapper')) {
            document.getElementById('acList').style.display = 'none';
        }
    });

    // Event delegation sul lista incantesimi — usa data-sid stringa, evita problemi con numeri grandi
    document.getElementById('spellList').addEventListener('click', (e) => {
        const card = e.target.closest('.spell-card');
        if (!card) return;
        const sid = card.getAttribute('data-sid');
        if (e.target.closest('.btn-delete')) { deleteSpell(sid); return; }
        if (e.target.closest('.btn-edit'))   { editSpell(sid);   return; }
        if (e.target.closest('.btn-pin'))    { togglePin(sid);   return; }
    });

    function toggleTheme() {
        const root = document.documentElement;
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function toggleAccordion(id) { document.getElementById(id).classList.toggle('open'); }

    function handleImg(e) {
        const reader = new FileReader();
        reader.onload = () => { currentImg = reader.result; showImgPreview(currentImg); };
        if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
    }

    function showImgPreview(src) {
        const wrapper = document.getElementById('imgPreviewWrapper');
        const img = document.getElementById('imgPreview');
        if(src) { img.src = src; wrapper.classList.remove('hidden'); }
        else { wrapper.classList.add('hidden'); }
    }

    function removeImg() {
        currentImg = "";
        document.getElementById('imgInput').value = "";
        showImgPreview("");
    }

    function handleFilterClick(el, type) {
        const val = el.getAttribute('data-val');
        el.classList.toggle('selected');
        if (el.classList.contains('selected')) filterState[type].push(val);
        else filterState[type] = filterState[type].filter(item => item !== val);
        render();
    }

    function focusSpell(id) {
        const card = document.getElementById('spell-' + id);
        if(card) {
            const yOffset = -150;
            const y = card.getBoundingClientRect().top + window.pageYOffset + yOffset;
            window.scrollTo({top: y, behavior: 'smooth'});
            card.classList.add('highlight');
            setTimeout(() => card.classList.remove('highlight'), 2000);
        }
    }

    function addNewClass() {
        const input = document.getElementById('newClassName');
        const className = input.value.trim();
        if (className && !CLASSES.includes(className)) {
            CLASSES.push(className);
            localStorage.setItem('grim_custom_classes', JSON.stringify(CLASSES));
            ['createClassGrid', 'filterClassGrid'].forEach(gid => {
                const c = document.getElementById(gid);
                const btn = document.createElement('div');
                btn.className = 'toggle-btn';
                btn.setAttribute('data-val', className);
                btn.onclick = function() {
                    if(gid.includes('create')) this.classList.toggle('selected');
                    else handleFilterClick(this, 'classes');
                };
                btn.innerText = className;
                c.appendChild(btn);
            });
            input.value = "";
        } else {
            alert("Inserisci un nome valido o classe già esistente.");
        }
    }

    function getEditionLabel(ed) {
        if (ed === '2014') return '<span class="edition-badge ed2014">2014</span>';
        if (ed === '2024') return '<span class="edition-badge ed2024">2024</span>';
        return '<span class="edition-badge homebrew">HB</span>';
    }
    
    function saveSpell() {
        const id = document.getElementById('editId').value ? parseInt(document.getElementById('editId').value) : Date.now();
        const selClasses = Array.from(document.querySelectorAll('#createClassGrid .toggle-btn.selected')).map(b => b.getAttribute('data-val'));
        const data = {
            id,
            nameIta: document.getElementById('nameIta').value,
            nameEng: document.getElementById('nameEng').value,
            edition: document.getElementById('edition').value || 'homebrew',
            level: document.getElementById('level').value,
            school: document.getElementById('school').value,
            ritual: document.getElementById('isRitual').checked,
            conc: document.getElementById('isConc').checked,
            cast: document.getElementById('castingTime').value,
            range: document.getElementById('range').value,
            duration: document.getElementById('duration').value,
            comp: { v: document.getElementById('compV').checked, s: document.getElementById('compS').checked, m: document.getElementById('compM').checked },
            mats: document.getElementById('materialDesc').value,
            classes: selClasses,
            effect: document.getElementById('effectDesc').value,
            higher: document.getElementById('higherLevels').value,
            image: currentImg
        };
        if(!data.nameIta) return alert("Inserisci almeno il nome!");
        const idx = spells.findIndex(x => x.id === id);
        if(idx > -1) spells[idx] = data; else spells.push(data);
        localStorage.setItem('grim_master_v1', JSON.stringify(spells));
        location.reload();
    }

    function render() {
        const list = document.getElementById('spellList');
        const query = document.getElementById('searchBar').value.toLowerCase();
        
        const pinned = spells.filter(s => pinnedIds.includes(s.id));
        document.getElementById('pinPanel').style.display = pinned.length ? 'block' : 'none';
        document.getElementById('pinnedContainer').innerHTML = pinned.map(s => `
            <span class="pin-tag" onclick="focusSpell('${s.id}')">${s.nameIta}</span>
        `).join('');

        const filtered = spells.filter(s => {
            const matchSearch = s.nameIta.toLowerCase().includes(query) || (s.nameEng||'').toLowerCase().includes(query);
            const matchLevel = filterState.levels.length === 0 || filterState.levels.includes(s.level.toString());
            const matchClass = filterState.classes.length === 0 || (s.classes||[]).some(c => filterState.classes.includes(c));
            const ed = s.edition || 'homebrew';
            const matchEdition = filterState.editions.length === 0 || filterState.editions.includes(ed);
            return matchSearch && matchLevel && matchClass && matchEdition;
        });

        // Build all HTML at once — usa data-sid (stringa) + classi per event delegation
        list.innerHTML = filtered.map(s => {
            const isPinned = pinnedIds.includes(String(s.id));
            const edLabel = getEditionLabel(s.edition || 'homebrew');
            const comps = [s.comp.v?'V':'', s.comp.s?'S':'', s.comp.m?'M':''].filter(Boolean).join(', ');
            return `
                <div class="spell-card" id="spell-${s.id}" data-sid="${s.id}">
                    <button class="btn-pin" style="position:absolute; top:10px; right:10px; background:none; border:none; cursor:pointer; font-size:1.5em;">${isPinned ? '📌' : '📍'}</button>
                    ${s.image ? `<img src="${s.image}" class="spell-img">` : ''}
                    <h3 style="margin:0; padding-right:35px;">${s.nameIta} ${edLabel}</h3>
                    <small><i>${s.nameEng||''}</i></small>
                    <div style="font-size:0.85em; margin:10px 0;">
                        <b>${s.level == 0 ? 'Trucchetto' : s.level + '° Livello'} ${s.school}</b> ${s.ritual ? '(Rituale)' : ''}<br>
                        <b>Lancio:</b> ${s.cast} | <b>Durata:</b> ${s.conc ? 'Conc. ' : ''}${s.duration}<br>
                        <b>Componenti:</b> ${comps}
                        ${s.comp.m && s.mats ? `<br><i>(${s.mats})</i>` : ''}
                    </div>
                    <p style="font-size:0.9em; white-space:pre-wrap; border-top: 1px solid var(--accent); padding-top:10px;">${s.effect}</p>
                    ${s.higher ? `<p style="font-size:0.85em; font-style:italic; opacity:0.8;"><b>Livelli Superiori:</b> ${s.higher}</p>` : ''}
                    <div style="display:flex; gap:5px; margin-top:15px;">
                        <button class="btn btn-edit" style="flex:1; background:#ff9800; color:white;">Modifica</button>
                        <button class="btn btn-delete" style="flex:1; background:#f44336; color:white;">Elimina</button>
                    </div>
                </div>`;
        }).join('');
    }

    function resetCompendio() {
        if(confirm("⚠️ Sei sicuro? Questa operazione cancellerà TUTTI gli incantesimi salvati e non è reversibile.")) {
            spells = [];
            pinnedIds = [];
            localStorage.removeItem('grim_master_v1');
            localStorage.removeItem('grim_master_pins');
            render();
        }
    }

    function togglePin(id) {
        const sid = String(id);
        pinnedIds = pinnedIds.includes(sid) ? pinnedIds.filter(i => i !== sid) : [...pinnedIds, sid];
        localStorage.setItem('grim_master_pins', JSON.stringify(pinnedIds));
        render();
    }

    function editSpell(id) {
        const s = spells.find(x => String(x.id) === String(id));
        document.getElementById('editId').value = s.id;
        document.getElementById('nameIta').value = s.nameIta;
        document.getElementById('nameEng').value = s.nameEng;
        document.getElementById('edition').value = s.edition || 'homebrew';
        document.getElementById('level').value = s.level;
        document.getElementById('school').value = s.school;
        document.getElementById('isRitual').checked = s.ritual;
        document.getElementById('isConc').checked = s.conc;
        document.getElementById('castingTime').value = s.cast;
        document.getElementById('range').value = s.range;
        document.getElementById('duration').value = s.duration;
        document.getElementById('compV').checked = s.comp.v;
        document.getElementById('compS').checked = s.comp.s;
        document.getElementById('compM').checked = s.comp.m;
        document.getElementById('materialDesc').value = s.mats;
        document.getElementById('matIn').classList.toggle('hidden', !s.comp.m);
        document.getElementById('effectDesc').value = s.effect;
        document.getElementById('higherLevels').value = s.higher || "";
        document.querySelectorAll('#createClassGrid .toggle-btn').forEach(b => {
            b.classList.toggle('selected', s.classes.includes(b.getAttribute('data-val')));
        });
        currentImg = s.image || "";
        showImgPreview(currentImg);
        window.scrollTo({top: 0, behavior: 'smooth'});
        document.getElementById('btnSave').innerText = "💾 Aggiorna Incantesimo";
    }

    function deleteSpell(id) {
        if(confirm("Eliminare definitivamente?")) {
            spells = spells.filter(s => String(s.id) !== String(id));
            localStorage.setItem('grim_master_v1', JSON.stringify(spells));
            render();
        }
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(spells, null, 2)], {type: 'application/json'}));
        a.download = 'grimorio_export.json';
        a.click();
    }

    function importData(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            spells = JSON.parse(ev.target.result);
            localStorage.setItem('grim_master_v1', JSON.stringify(spells));
            render();
        };
        r.readAsText(e.target.files[0]);
    }

    // Init Griglie Classi
    ['createClassGrid', 'filterClassGrid'].forEach(gid => {
        const c = document.getElementById(gid);
        CLASSES.forEach(cl => {
            c.innerHTML += `<div class="toggle-btn" data-val="${cl}" onclick="${gid.includes('create') ? "this.classList.toggle('selected')" : "handleFilterClick(this, 'classes')"}">${cl}</div>`;
        });
    });

    render();
</script>
</body>
</html>
