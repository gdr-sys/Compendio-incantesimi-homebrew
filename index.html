<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio Homebrew Pro</title>
    <style>
        :root[data-theme="light"] {
            --primary: #8b0000; --bg: #f4ece1; --card-bg: #fffdfa;
            --text: #332b21; --accent: #bc9a70; --form-bg: #e9decb; --pin-bg: #d4c4a8;
        }
        :root[data-theme="dark"] {
            --primary: #ff4d4d; --bg: #1a1a1a; --card-bg: #2d2d2d;
            --text: #e0e0e0; --accent: #5d4a36; --form-bg: #3d3d3d; --pin-bg: #4a3f35;
        }
        body { font-family: 'Palatino', serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        
        .top-panels { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .panel { background: var(--pin-bg); padding: 15px; border-radius: 8px; border: 1px dashed var(--primary); }
        
        .spell-form {
            background: var(--form-bg); padding: 20px; border-radius: 8px; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px;
        }
        .full-width { grid-column: 1 / -1; }
        input, select, textarea { padding: 10px; border: 1px solid var(--accent); border-radius: 4px; background: var(--card-bg); color: var(--text); }

        .spell-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .spell-card { background: var(--card-bg); border: 1px solid var(--accent); border-left: 8px solid var(--primary); padding: 15px; border-radius: 4px; position: relative; }

        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 8px 12px; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; }
        
        @media print {
            body * { visibility: hidden; }
            #print-zone, #print-zone * { visibility: visible; }
            #print-zone {
                position: absolute; left: 0; top: 0; width: 100%;
                display: grid !important; grid-template-columns: repeat(3, 6.35cm); gap: 0.4cm;
            }
            .print-card { width: 6.35cm; height: 8.89cm; border: 1px solid #000; padding: 10px; box-sizing: border-box; background: white !important; color: black !important; font-size: 9pt; }
        }
        #print-zone { display: none; }
    </style>
</head>
<body>

<div class="container no-print">
    <header>
        <h1>📖 Grimorio Homebrew</h1>
        <button onclick="toggleTheme()" class="btn btn-main">🌓 Tema</button>
    </header>

    <div class="top-panels">
        <div class="panel" id="pinPanel" style="display:none">
            <strong>📌 Preparati:</strong> <span id="pinnedContainer"></span>
        </div>
        <div class="panel">
            <strong>🖨️ Coda Stampa: <span id="printCount">0</span></strong>
            <button onclick="generatePDF()" class="btn" style="margin-left:10px;">Genera PDF A4</button>
        </div>
    </div>

    <section class="spell-form">
        <input type="hidden" id="editId">
        <input type="text" id="nameIta" placeholder="Nome Incantesimo (ITA)">
        <select id="level">
            <option value="0">Trucchetto</option>
            <script>for(let i=1;i<=9;i++) document.write(`<option value="${i}">${i}° Livello</option>`)</script>
        </select>
        <select id="school">
            <option>Abiurazione</option><option>Invocazione</option><option>Necromanzia</option><option>Trasmutazione</option>
        </select>
        <input type="text" id="castingTime" placeholder="Tempo di lancio">
        <input type="text" id="duration" placeholder="Durata">
        <select id="classesSelect" multiple class="full-width" style="height:60px;"></select>
        <textarea id="effectDesc" class="full-width" rows="3" placeholder="Descrizione incantesimo..."></textarea>
        <button onclick="handleSubmit()" class="btn btn-main full-width" id="btnSave">📜 Salva Incantesimo</button>
    </section>

    <div style="margin-bottom:20px;">
        <input type="text" id="searchBar" placeholder="🔍 Cerca..." onkeyup="renderSpells()" style="width:100%; padding:10px;">
    </div>

    <div id="spellList" class="spell-grid"></div>
</div>

<div id="print-zone"></div>

<script>
    let spells = JSON.parse(localStorage.getItem('dnd_vFinal_spells')) || [];
    let pinnedIds = JSON.parse(localStorage.getItem('dnd_vFinal_pinned')) || [];
    let printQueue = [];
    let isEditing = false;

    const CLASS_LIST = ["Bardo", "Chierico", "Druido", "Mago", "Paladino", "Ranger", "Stregone", "Warlock"];

    function toggleTheme() {
        const root = document.documentElement;
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function handleSubmit() {
        const id = isEditing ? parseInt(document.getElementById('editId').value) : Date.now();
        const s = {
            id,
            nameIta: document.getElementById('nameIta').value,
            level: document.getElementById('level').value,
            school: document.getElementById('school').value,
            castingTime: document.getElementById('castingTime').value,
            duration: document.getElementById('duration').value,
            classes: Array.from(document.getElementById('classesSelect').selectedOptions).map(o => o.value),
            desc: document.getElementById('effectDesc').value
        };
        
        if(!s.nameIta) return alert("Inserisci almeno il nome!");

        if(isEditing) {
            const idx = spells.findIndex(x => x.id === id);
            spells[idx] = s;
        } else {
            spells.push(s);
        }

        localStorage.setItem('dnd_vFinal_spells', JSON.stringify(spells));
        resetForm();
        renderAll();
    }

    function resetForm() {
        isEditing = false;
        document.getElementById('editId').value = '';
        document.getElementById('nameIta').value = '';
        document.getElementById('effectDesc').value = '';
        document.getElementById('btnSave').innerText = "📜 Salva Incantesimo";
    }

    function togglePin(id) {
        pinnedIds = pinnedIds.includes(id) ? pinnedIds.filter(i => i !== id) : [...pinnedIds, id];
        localStorage.setItem('dnd_vFinal_pinned', JSON.stringify(pinnedIds));
        renderAll();
    }

    function togglePrint(id) {
        printQueue = printQueue.includes(id) ? printQueue.filter(i => i !== id) : [...printQueue, id];
        document.getElementById('printCount').innerText = printQueue.length;
        renderSpells();
    }

    function renderAll() {
        renderPinned();
        renderSpells();
    }

    function renderPinned() {
        const container = document.getElementById('pinnedContainer');
        const panel = document.getElementById('pinPanel');
        const pinned = spells.filter(s => pinnedIds.includes(s.id));
        panel.style.display = pinned.length ? 'block' : 'none';
        container.innerHTML = pinned.map(s => `
            <span style="background:white; padding:2px 8px; border-radius:10px; margin-right:5px; border:1px solid var(--primary); cursor:pointer" onclick="document.getElementById('spell-${s.id}').scrollIntoView()">
                ${s.nameIta} <small onclick="event.stopPropagation(); togglePin(${s.id})">×</small>
            </span>
        `).join('');
    }

    function renderSpells() {
        const list = document.getElementById('spellList');
        const query = document.getElementById('searchBar').value.toLowerCase();
        list.innerHTML = '';

        spells.filter(s => s.nameIta.toLowerCase().includes(query)).forEach(s => {
            const isP = pinnedIds.includes(s.id);
            const isPr = printQueue.includes(s.id);
            list.innerHTML += `
                <div class="spell-card" id="spell-${s.id}">
                    <div style="display:flex; justify-content:space-between">
                        <h3 style="margin:0">${s.nameIta}</h3>
                        <button onclick="togglePin(${s.id})" style="background:none; border:none; cursor:pointer">${isP ? '📌' : '📍'}</button>
                    </div>
                    <p style="font-size:0.8em; margin:5px 0">Liv. ${s.level} | ${s.school}</p>
                    <p style="font-size:0.9em">${s.desc}</p>
                    <button class="btn" style="width:100%; margin-bottom:5px; background:${isPr ? '#c62828' : '#2e7d32'}; color:white" onclick="togglePrint(${s.id})">
                        ${isPr ? 'Rimuovi Stampa' : 'Aggiungi Stampa'}
                    </button>
                    <div style="display:flex; gap:5px">
                        <button onclick="editSpell(${s.id})" class="btn" style="flex:1; background:#ff9800; color:white">Edit</button>
                        <button onclick="deleteSpell(${s.id})" class="btn" style="flex:1; background:#f44336; color:white">Del</button>
                    </div>
                </div>`;
        });
    }

    function editSpell(id) {
        const s = spells.find(x => x.id === id);
        isEditing = true;
        document.getElementById('editId').value = s.id;
        document.getElementById('nameIta').value = s.nameIta;
        document.getElementById('effectDesc').value = s.desc;
        document.getElementById('btnSave').innerText = "💾 Aggiorna Incantesimo";
        window.scrollTo(0,0);
    }

    function deleteSpell(id) {
        if(confirm("Eliminare incantesimo?")) {
            spells = spells.filter(s => s.id !== id);
            localStorage.setItem('dnd_vFinal_spells', JSON.stringify(spells));
            renderAll();
        }
    }

    function generatePDF() {
        if(!printQueue.length) return alert("Seleziona incantesimi per la stampa!");
        const zone = document.getElementById('print-zone');
        zone.innerHTML = printQueue.map(id => {
            const s = spells.find(x => x.id === id);
            return `<div class="print-card"><h3>${s.nameIta}</h3><p>Liv. ${s.level} | ${s.school}</p><p>${s.desc}</p></div>`;
        }).join('');
        window.print();
    }

    // Inizializzazione classi
    const sel = document.getElementById('classesSelect');
    CLASS_LIST.forEach(c => sel.add(new Option(c, c)));

    renderAll();
</script>
</body>
</html>
