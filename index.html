<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio Pro - Print Manager</title>
    <style>
        :root[data-theme="light"] {
            --primary: #8b0000; --bg: #f4ece1; --card-bg: #fffdfa;
            --text: #332b21; --accent: #bc9a70; --form-bg: #e9decb;
        }
        :root[data-theme="dark"] {
            --primary: #ff4d4d; --bg: #1a1a1a; --card-bg: #2d2d2d;
            --text: #e0e0e0; --accent: #5d4a36; --form-bg: #3d3d3d;
        }
        body { font-family: 'Palatino', serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Pannello Stampa Rapida */
        .print-manager {
            position: sticky; top: 10px; z-index: 100;
            background: var(--primary); color: white; padding: 15px;
            border-radius: 8px; margin-bottom: 20px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Griglia UI */
        .spell-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .spell-card { 
            background: var(--card-bg); border: 1px solid var(--accent); 
            border-left: 8px solid var(--primary); padding: 15px; border-radius: 4px;
        }

        .btn-add-print { background: #2e7d32; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-add-print.active { background: #c62828; }

        /* --- LOGICA DI STAMPA PDF --- */
        @media print {
            @page { size: A4; margin: 1cm; }
            body * { visibility: hidden; }
            #print-ready-zone, #print-ready-zone * { visibility: visible; }
            #print-ready-zone {
                position: absolute; left: 0; top: 0; width: 100%;
                display: grid !important; grid-template-columns: repeat(3, 6.35cm);
                gap: 0.5cm; justify-content: center;
            }
            .print-card {
                width: 6.35cm; height: 8.89cm; border: 1px solid #333;
                padding: 10px; box-sizing: border-box; background: white !important;
                color: black !important; overflow: hidden; position: relative;
            }
            .print-card h3 { font-size: 11pt; margin: 0; border-bottom: 1px solid #8b0000; color: #8b0000 !important; }
            .print-card .meta { font-size: 7pt; font-style: italic; margin: 3px 0; }
            .print-card .desc { font-size: 8pt; line-height: 1.1; }
            .no-print { display: none !important; }
        }

        #print-ready-zone { display: none; }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="print-manager">
        <div>
            <strong>🖨️ Coda di Stampa:</strong> 
            <span id="print-count">0</span> incantesimi selezionati
        </div>
        <button onclick="prepareAndPrint()" style="background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer;">
            Genera Foglio di Stampa
        </button>
    </div>

    <header>
        <h1>📖 Grimorio Homebrew</h1>
    </header>

    <div class="io-controls">
        <input type="text" id="searchBar" placeholder="🔍 Filtra incantesimi..." onkeyup="renderSpells()" style="width:100%; padding:10px;">
    </div>

    <div id="spellList" class="spell-grid"></div>
</div>

<!-- Area nascosta che si attiva solo durante la stampa -->
<div id="print-ready-zone"></div>

<script>
    let spells = JSON.parse(localStorage.getItem('dnd_v7_spells')) || [];
    let printQueue = [];

    function togglePrintQueue(id) {
        const index = printQueue.indexOf(id);
        if (index > -1) {
            printQueue.splice(index, 1);
        } else {
            printQueue.push(id);
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('print-count').innerText = printQueue.length;
        renderSpells();
    }

    function renderSpells() {
        const list = document.getElementById('spellList');
        const query = document.getElementById('searchBar').value.toLowerCase();
        list.innerHTML = '';

        spells.filter(s => s.nameIta.toLowerCase().includes(query)).forEach(s => {
            const isSelected = printQueue.includes(s.id);
            list.innerHTML += `
                <div class="spell-card">
                    <h3>${s.nameIta}</h3>
                    <p style="font-size:0.85em; opacity:0.8;">${s.desc.substring(0, 100)}...</p>
                    <button class="btn-add-print ${isSelected ? 'active' : ''}" onclick="togglePrintQueue(${s.id})">
                        ${isSelected ? '❌ Rimuovi dalla stampa' : '➕ Aggiungi alla stampa'}
                    </button>
                </div>`;
        });
    }

    function prepareAndPrint() {
        if (printQueue.length === 0) return alert("Seleziona almeno un incantesimo!");

        const zone = document.getElementById('print-ready-zone');
        zone.innerHTML = '';

        printQueue.forEach(id => {
            const s = spells.find(x => x.id === id);
            zone.innerHTML += `
                <div class="print-card">
                    <h3>${s.nameIta}</h3>
                    <div class="meta">Livello ${s.level || '0'} | ${s.school || 'Scuola'}</div>
                    <div class="desc">${s.desc}</div>
                </div>`;
        });

        window.print();
    }

    // Dati di esempio se vuoto
    if(spells.length === 0) {
        spells = [
            {id: 1, nameIta: "Dardo Incantato", desc: "Crei tre dardi luminosi di forza magica. Ogni dardo colpisce una creatura a tua scelta che tu possa vedere entro la gittata. Un dardo infligge 1d4 + 1 danni da forza al suo bersaglio.", level: "1", school: "Invocazione"},
            {id: 2, nameIta: "Palla di Fuoco", desc: "Un fascio di luce scarlatta scaturisce dal tuo dito indice verso un punto scelto entro la gittata e poi esplode in una deflagrazione di fiamme.", level: "3", school: "Invocazione"}
        ];
    }

    renderSpells();
</script>
</body>
</html>
