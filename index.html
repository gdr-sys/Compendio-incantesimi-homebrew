"tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "24 ore", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Mago"], "descrizione": "Una creatura consenziente toccata dall'incantatore è immune ai danni psichici, a qualsiasi effetto che possa percepirne le emozioni o leggerne i pensieri, agli incantesimi di divinazione e alla condizione affascinato. L'incantesimo annulla perfino gli incantesimi desiderio e gli incantesimi o effetti di potenza analoga usati per influenzare la mente del bersaglio.", "livelli_superiori": ""}, {"id": "srd_zona_di_verita", "nome": "Zona di Verità", "livello": 2, "edizione": "2014", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "10 minuti", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Chierico", "Paladino"], "descrizione": "L'incantatore crea una zona magica che protegge dagli inganni all'interno di una sfera con raggio di 4,5 metri centrata su un punto entro gittata. Una creatura che entra nell'area per la prima volta in un turno o vi inizia il turno deve superare un TS su Carisma. Se lo fallisce, non può mentire deliberatamente. L'incantatore sa chi ha superato o fallito il tiro.", "livelli_superiori": ""}, {"id": "srd_aiuto", "nome": "Aiuto", "livello": 2, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "8 ore", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "una sottile striscia di stoffa bianca", "classi": ["Chierico", "Paladino"], "descrizione": "L'incantatore invoca una benedizione che rinvigorisce i suoi alleati. Sceglie fino a tre creature entro gittata. Il massimo dei punti ferita e i punti ferita attuali di ogni bersaglio aumentano di 5 per la durata dell'incantesimo.", "livelli_superiori": "Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3º livello o superiore, i punti ferita dei bersagli aumentano di altri 5 per ogni livello dello slot sopra il 2º."}, {"id": "srd_allarme", "nome": "Allarme", "livello": 1, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 minuto (rituale)", "gittata": "9 metri", "durata": "8 ore", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un minuscolo campanello e un sottile filo d'argento", "classi": ["Mago", "Ranger"], "descrizione": "L'incantatore imposta un allarme per rilevare le intrusioni. Sceglie una porta, una finestra o un'area entro gittata che non superi un cubo con spigolo di 6 metri. Finché l'incantesimo non termina, un allarme avvisa l'incantatore ogni volta che una creatura Minuscola o più grande entra nell'area o la attraversa. L'incantatore sceglie se l'allarme debba essere mentale o acustico.", "livelli_superiori": ""}, {"id": "srd_allucinazione_mortale", "nome": "Allucinazione Mortale", "livello": 4, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Mago", "Stregone", "Warlock"], "descrizione": "L'incantatore attinge alle paure più profonde di una creatura che egli è in grado di vedere entro gittata e crea un'illusione che solo essa può vedere. Il bersaglio deve effettuare un tiro salvezza su Saggezza. Se lo fallisce, diventa spaventato per la durata dell'incantesimo. Alla fine di ogni turno del bersaglio, esso deve superare un tiro salvezza su Saggezza o subire 4d10 danni psichici.", "livelli_superiori": "Il danno aumenta di 1d10 per ogni livello dello slot sopra il 4º."}, {"id": "srd_amicizia", "nome": "Amicizia", "livello": 0, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "Personale", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": false, "s": true, "m": true}, "materiali": "un po' di trucco applicato sul volto durante il lancio", "classi": ["Bardo", "Mago", "Stregone", "Warlock"], "descrizione": "Per la durata dell'incantesimo, l'incantatore dispone di vantaggio a tutte le prove di Carisma dirette a una creatura a sua scelta che non sia ostile nei suoi confronti. Quando l'incantesimo termina, la creatura si rende conto che l'incantatore ha usato la magia per influenzare il suo umore e diventa ostile.", "livelli_superiori": ""}, {"id": "srd_amicizia_animale", "nome": "Amicizia Animale", "livello": 1, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "24 ore", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di cibo per animali", "classi": ["Bardo", "Druido", "Ranger"], "descrizione": "L'incantatore convince un animale di non avere intenzioni ostili. Sceglie una bestia entro gittata che sia in grado di vederlo e sentirlo. Se l'Intelligenza della bestia è pari o superiore a 4, l'incantesimo fallisce. Altrimenti, la bestia deve superare un tiro salvezza su Saggezza o essere affascinata dall'incantatore per la durata dell'incantesimo.", "livelli_superiori": "L'incantatore può colpire una bestia aggiuntiva per ogni livello dello slot sopra il 1º."}, {"id": "srd_analizzare_natura", "nome": "Analizzare Natura", "livello": 1, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 azione (rituale)", "gittata": "Contatto", "durata": "Istantanea", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "una perla del valore di almeno 100 mo e una piuma di gufo", "classi": ["Bardo", "Mago"], "descrizione": "L'incantatore sceglie un oggetto o una creatura. Se tocca un oggetto, ne apprende le proprietà magiche e come utilizzarle, incluse eventuali cariche o requisiti di sintonia. Se tocca una creatura, apprende quali incantesimi la stanno influenzando.", "livelli_superiori": ""}, {"id": "srd_anatema", "nome": "Anatema", "livello": 1, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "una goccia di sangue", "classi": ["Bardo", "Chierico"], "descrizione": "L'incantatore tenta di maledire fino a tre creature. Ogni bersaglio deve effettuare un tiro salvezza su Carisma. Se lo fallisce, deve sottrarre 1d4 a ogni tiro per colpire o tiro salvezza effettuato prima del termine dell'incantesimo.", "livelli_superiori": "L'incantatore può colpire una creatura aggiuntiva per ogni livello dello slot sopra il 1º."}, {"id": "srd_animare_morti", "nome": "Animare Morti", "livello": 3, "edizione": "2024", "scuola": "Necromanzia", "tempo_lancio": "1 minuto", "gittata": "3 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "una goccia di sangue, un pezzetto di carne e un pizzico di polvere d'osso", "classi": ["Chierico", "Mago"], "descrizione": "Questo incantesimo crea un servitore non morto. L'incantatore sceglie un mucchio di ossa o un corpo di un umanoide Medio o Piccolo entro gittata. L'incantesimo infonde al bersaglio un'imitazione corrotta della vita, facendolo risorgere come uno scheletro (se sono state scelte delle ossa) o come uno zombi (se è stato scelto un corpo).", "livelli_superiori": "Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 4º livello o superiore, anima o riafferma il controllo su due creature non morte aggiuntive per ogni livello dello slot sopra il 3º."}, {"id": "srd_animare_oggetti", "nome": "Animare Oggetti", "livello": 5, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "Gli oggetti prendono vita al comando dell'incantatore. Sceglie fino a dieci oggetti non magici entro gittata che non siano indossati o trasportati. Bersagli di taglia Media contano come due oggetti, taglia Grande come quattro, taglia Enorme come otto. L'incantatore non può animare oggetti di taglia Mastodontica.", "livelli_superiori": "Se l'incantatore lancia questo incantesimo usando uno slot incantesimo di 6º livello o superiore, può animare due oggetti aggiuntivi per ogni livello dello slot sopra il 5º."}, {"id": "srd_antipatia_simpatia", "nome": "Antipatia/Simpatia", "livello": 8, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "10 giorni", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un grumo di allume imbevuto nell'aceto per l'antipatia o una goccia di miele per la simpatia", "classi": ["Druido", "Mago"], "descrizione": "L'incantatore attira o respinge creature di un tipo specifico verso un oggetto o un'area. Sceglie un tipo di creatura (come draghi, folletti o non morti) e un oggetto o un'area. Sceglie poi tra Antipatia (la creatura deve fuggire) o Simpatia (la creatura è attratta e vuole stare vicino all'obiettivo).", "livelli_superiori": ""}, {"id": "srd_apertura", "nome": "Apertura", "livello": 2, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "L'incantatore sceglie un oggetto entro gittata. L'oggetto può essere una porta, una scatola, un baule, un paio di manette, un lucchetto o un altro oggetto che contenga un meccanismo di chiusura mondano o magico. Se l'oggetto è chiuso da un lucchetto mondano, questo si sblocca. Se è chiuso magicamente da Serratura Arcana, l'incantesimo viene soppresso per 10 minuti.", "livelli_superiori": ""}, {"id": "srd_appiccare_fuoco", "nome": "Appiccare Fuoco", "livello": 0, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "Personale", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Druido", "Mago", "Stregone"], "descrizione": "Una fiammata si sprigiona dalla mano dell'incantatore. Ogni creatura entro un cubo di 1,5 metri deve superare un tiro salvezza su Destrezza o subire 1d10 danni da fuoco. Questo incantesimo incendia gli oggetti infiammabili nell'area che non sono indossati o trasportati.", "livelli_superiori": "Il danno dell'incantesimo aumenta di 1d10 quando l'incantatore raggiunge il 5º livello (2d10), l'11º livello (3d10) e il 17º livello (4d10)."}, {"id": "srd_arcano_occhio", "nome": "Occhio Arcano", "livello": 4, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di pelliccia di pipistrello", "classi": ["Mago"], "descrizione": "L'incantatore crea un occhio invisibile e fluttuante che si muove al suo comando. L'occhio ha scurovisione fino a 9 metri e può muoversi in ogni direzione. L'incantatore riceve mentalmente le informazioni visive dall'occhio.", "livelli_superiori": ""}, {"id": "srd_arma_spirituale", "nome": "Arma Spirituale", "livello": 2, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione bonus", "gittata": "18 metri", "durata": "1 minuto", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico"], "descrizione": "L'incantatore crea un'arma spettrale fluttuante che attacca i suoi nemici. Quando lancia l'incantesimo, può effettuare un attacco incantesimo in mischia contro una creatura entro 1,5 metri dall'arma. Se colpisce, il bersaglio subisce danni da forza pari a 1d8 + il modificatore della caratteristica da incantatore.", "livelli_superiori": "Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3º livello o superiore, il danno aumenta di 1d8 per ogni due livelli dello slot sopra il 2º."}, {"id": "srd_armatura_di_agathys", "nome": "Armatura di Agathys", "livello": 1, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Personale", "durata": "1 ora", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "una tazza d'acqua", "classi": ["Warlock"], "descrizione": "Una forza magica protettiva circonda l'incantatore, manifestandosi come un gelo spettrale. Guadagna 5 punti ferita temporanei. Se una creatura colpisce l'incantatore con un attacco in mischia mentre ha questi punti ferita, subisce 5 danni da freddo.", "livelli_superiori": "Sia i punti ferita temporanei che i danni da freddo aumentano di 5 per ogni livello dello slot sopra il 1º."}, {"id": "srd_armatura_magica", "nome": "Armatura Magica", "livello": 1, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "8 ore", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pezzetto di cuoio conciato", "classi": ["Mago", "Stregone"], "descrizione": "L'incantatore tocca una creatura consenziente che non indossa armatura. Finché l'incantesimo non termina, la CA base del bersaglio diventa 13 + il suo modificatore di Destrezza. L'incantesimo termina se il bersaglio indossa un'armatura o se l'incantatore lo interrompe come azione.", "livelli_superiori": ""}, {"id": "srd_astuzia_della_volpe", "nome": "Astuzia della Volpe (Splendore dell'Aquila)", "livello": 2, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "peli o piume di un animale", "classi": ["Bardo", "Chierico", "Druido", "Mago", "Stregone"], "descrizione": "L'incantatore infonde a una creatura la resistenza o l'abilità di una bestia. Sceglie uno dei seguenti effetti: Forza del Toro, Grazia del Gatto, Costituzione dell'Orso, Astuzia della Volpe, Saggezza del Gufo o Splendore dell'Aquila. Il bersaglio ottiene vantaggio alle prove relative alla caratteristica scelta.", "livelli_superiori": "Puoi colpire una creatura aggiuntiva per ogni livello dello slot sopra il 2º."}, {"id": "srd_attutire_caduta", "nome": "Attutire Caduta", "livello": 1, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 reazione", "gittata": "18 metri", "durata": "1 minuto", "rituale": false, "concentrazione": false, "comp": {"v": false, "s": false, "m": true}, "materiali": "una piccola piuma o del piumino", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "Sceglie fino a cinque creature che cadono entro gittata. La velocità di caduta dei bersagli scende a 18 metri per round. Se il bersaglio atterra prima del termine, non subisce danni dalla caduta e atterra in piedi.", "livelli_superiori": ""}, {"id": "srd_augurio", "nome": "Augurio", "livello": 2, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 minuto (rituale)", "gittata": "Personale", "durata": "Istantanea", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "bastoncini, ossa o carte contrassegnate del valore di almeno 25 mo", "classi": ["Chierico"], "descrizione": "Interrogando entità extraplanari, l'incantatore riceve un presagio su un'azione specifica che intende compiere entro i successivi 30 minuti. Il DM sceglie tra: Bene, Male, Bene e Male, Nulla.", "livelli_superiori": ""}, {"id": "srd_aura_di_purezza", "nome": "Aura di Purezza", "livello": 4, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Personale (9 metri)", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Paladino"], "descrizione": "Un'energia purificatrice si irradia dall'incantatore in un raggio di 9 metri. Per la durata, le creature non ostili nell'aura non possono contrarre malattie, hanno resistenza ai danni da veleno e vantaggio ai tiri salvezza contro effetti che le renderebbero accecate, affascinate, assordate, spaventate, paralizzate, avvelenate o stordite.", "livelli_superiori": ""}, {"id": "srd_aura_di_vitalita", "nome": "Aura di Vitalità", "livello": 3, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione", "gittata": "Personale (9 metri)", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Paladino"], "descrizione": "Un'aura di energia curativa si sprigiona dall'incantatore. Finché l'incantesimo non termina, l'incantatore può usare un'azione bonus nel suo turno per far recuperare 2d6 punti ferita a una creatura entro l'aura (incluso se stesso).", "livelli_superiori": ""}, {"id": "srd_aura_santuario", "nome": "Aura Santuario", "livello": 5, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Personale (9 metri)", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Paladino"], "descrizione": "Una luce sacra si sprigiona dall'incantatore. Le creature non ostili entro 9 metri hanno vantaggio a tutti i tiri salvezza, e le creature demoniache o non morte hanno svantaggio ai tiri per colpire contro di esse.", "livelli_superiori": ""}, {"id": "srd_bacche_buone", "nome": "Bacche Buone", "livello": 1, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un rametto di vischio", "classi": ["Druido", "Ranger"], "descrizione": "Appaiono fino a dieci bacche nella mano dell'incantatore. Una creatura può usare la sua azione per mangiare una bacca. Mangiare una bacca fa recuperare 1 punto ferita e fornisce nutrimento sufficiente per un giorno intero.", "livelli_superiori": ""}, {"id": "srd_banchetto_degli_eroi", "nome": "Banchetto degli Eroi", "livello": 6, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "10 minuti", "gittata": "9 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un calice incrostato di gemme del valore di almeno 1.000 mo (consumato)", "classi": ["Chierico", "Druido"], "descrizione": "L'incantatore evoca un banchetto magnifico. Fino a dodici creature possono banchettare per un'ora. I partecipanti ottengono: immunità al veleno e alla condizione spaventato, vantaggio ai tiri salvezza su Saggezza e un aumento di 2d10 punti ferita massimi per 24 ore.", "livelli_superiori": ""}, {"id": "srd_bastone_incantato", "nome": "Bastone Incantato", "livello": 0, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione bonus", "gittata": "Contatto", "durata": "1 minuto", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "vischio, una foglia di trifoglio e un bastone o un randello di legno", "classi": ["Druido"], "descrizione": "L'incantatore infonde il potere della natura in un bastone o un randello che impugna. Per la durata, può usare la sua caratteristica da incantatore anziché la Forza per i tiri per colpire e per i danni degli attacchi in mischia effettuati con quell'arma, e il dado del danno dell'arma diventa un d8. L'arma diventa inoltre magica.", "livelli_superiori": ""}, {"id": "srd_benedizione", "nome": "Benedizione", "livello": 1, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "una goccia di acqua santa", "classi": ["Chierico", "Paladino"], "descrizione": "L'incantatore benedice fino a tre creature a sua scelta entro gittata. Ogni volta che un bersaglio effettua un tiro per colpire o un tiro salvezza prima del termine dell'incantesimo, può tirare un d4 e aggiungere il risultato al tiro.", "livelli_superiori": "L'incantatore può colpire una creatura aggiuntiva per ogni livello dello slot sopra il 1º."}, {"id": "srd_bocca_magica", "nome": "Bocca Magica", "livello": 2, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 minuto (rituale)", "gittata": "9 metri", "durata": "Fino a quando non viene dissolto", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pezzetto di favo e un po' di polvere di giada del valore di almeno 10 mo (consumata)", "classi": ["Bardo", "Mago"], "descrizione": "L'incantatore imprime un messaggio magico su un oggetto entro gittata. L'incantatore stabilisce una circostanza specifica che faccia attivare l'incantesimo. Quando quella circostanza si verifica, una bocca appare sull'oggetto e recita il messaggio (fino a 25 parole) con la voce dell'incantatore.", "livelli_superiori": ""}, {"id": "srd_buio", "nome": "Buio", "livello": 2, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": false, "m": true}, "materiali": "un po' di pelliccia di pipistrello e un pezzetto di carbone o una goccia di catrame", "classi": ["Mago", "Stregone", "Warlock"], "descrizione": "Un'oscurità magica si sprigiona da un punto scelto dall'incantatore fino a riempire una sfera del raggio di 4,5 metri. L'oscurità si diffonde oltre gli angoli. Una creatura dotata di scurovisione non può vedere attraverso questa oscurità e la luce non magica non può illuminarla.", "livelli_superiori": ""}, {"id": "srd_caduta_morbida", "nome": "Caduta Morbida", "livello": 1, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 reazione", "gittata": "18 metri", "durata": "1 minuto", "rituale": false, "concentrazione": false, "comp": {"v": false, "s": false, "m": true}, "materiali": "una piccola piuma o del piumino", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "L'incantatore sceglie fino a cinque creature che cadono entro gittata. La velocità di caduta dei bersagli scende a 18 metri per round fino al termine dell'incantesimo. Se il bersaglio atterra prima del termine, non subisce danni dalla caduta e atterra in piedi.", "livelli_superiori": ""}, {"id": "srd_calmare_emozioni", "nome": "Calmare Emozioni", "livello": 2, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Chierico"], "descrizione": "L'incantatore tenta di sopprimere le forti emozioni di un gruppo di persone. Ogni umanoide entro una sfera del raggio di 6 metri deve effettuare un tiro salvezza su Carisma. Se fallisce, l'incantatore può scegliere di rendere indifferente una creatura ostile o di sopprimere gli effetti di spaventato o affascinato.", "livelli_superiori": ""}, {"id": "srd_camminare_sull_acqua", "nome": "Camminare sull'Acqua", "livello": 3, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione (rituale)", "gittata": "9 metri", "durata": "1 ora", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pezzetto di sughero", "classi": ["Chierico", "Druido", "Ranger", "Stregone"], "descrizione": "Questo incantesimo conferisce la capacità di muoversi su qualsiasi superficie liquida (acqua, fango, neve, sabbie mobili, lava) come se fosse terreno solido a un massimo di dieci creature consenzienti entro gittata.", "livelli_superiori": ""}, {"id": "srd_campo_anti_magia", "nome": "Campo Anti-magia", "livello": 8, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Personale (sfera del raggio di 3 metri)", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di polvere di ferro o limatura di ferro", "classi": ["Chierico", "Mago"], "descrizione": "Una sfera invisibile di antimagia circonda l'incantatore. All'interno della sfera gli incantesimi non possono essere lanciati, le creature evocate scompaiono e persino gli oggetti magici diventano mondani.", "livelli_superiori": ""}, {"id": "srd_capanna_di_leomund", "nome": "Capanna di Leomund", "livello": 3, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 minuto (rituale)", "gittata": "Personale (emisfero del raggio di 3 metri)", "durata": "8 ore", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "una sferetta di cristallo", "classi": ["Bardo", "Mago"], "descrizione": "Una cupola di forza immobile di colore opaco appare attorno e sopra l'incantatore. Possono trovarsi all'interno fino a nove creature di taglia Media o inferiore. L'incantesimo termina se l'incantatore ne esce. Atmosfera e temperatura restano confortevoli, la magia e le creature esterne non possono attraversarla.", "livelli_superiori": ""}, {"id": "srd_caratteristica_migliorata", "nome": "Caratteristica Migliorata", "livello": 2, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "peli o piume di un animale", "classi": ["Bardo", "Chierico", "Druido", "Mago", "Stregone"], "descrizione": "L'incantatore infonde a una creatura la forza o l'abilità di una bestia. Sceglie una caratteristica (Forza, Destrezza, Costituzione, Intelligenza, Saggezza, Carisma). Il bersaglio ottiene vantaggio alle prove relative a quella caratteristica (e punti ferita temporanei per Costituzione).", "livelli_superiori": "L'incantatore può colpire una creatura aggiuntiva per ogni livello dello slot sopra il 2º."}, {"id": "srd_carne_in_pietra", "nome": "Carne in Pietra", "livello": 6, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di calce, acqua e terra", "classi": ["Mago", "Warlock"], "descrizione": "L'incantatore tenta di trasformare in pietra una creatura che egli è in grado di vedere entro gittata. Il bersaglio deve effettuare un tiro salvezza su Costituzione. Se lo fallisce, è trattenuto poiché la sua carne inizia a indurirsi. Deve ripetere il tiro salvezza alla fine di ogni suo turno. Se lo fallisce per tre volte, la creatura è pietrificata per la durata.", "livelli_superiori": ""}, {"id": "srd_catena_di_fulmini", "nome": "Catena di Fulmini", "livello": 6, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "45 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un po' di pelliccia, un pezzo di ambra, vetro o una bacchetta di cristallo e tre spilli d'argento", "classi": ["Mago", "Stregone"], "descrizione": "L'incantatore scaglia un fulmine verso un bersaglio a sua scelta entro gittata. Dal bersaglio scaturiscono poi altri tre fulmini che colpiscono altri tre bersagli entro 9 metri dal primo. Ogni bersaglio deve effettuare un tiro salvezza su Destrezza: subisce 10d8 danni da fulmine se lo fallisce, o la metà se lo supera.", "livelli_superiori": "Il numero di fulmini secondari aumenta di uno per ogni livello dello slot sopra il 6º."}, {"id": "srd_caos_diretto", "nome": "Caos Diretto (Dardo del Caos)", "livello": 1, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Stregone"], "descrizione": "L'incantatore scaglia una massa oscillante di energia caotica. Effettua un attacco incantesimo a distanza. Se colpisce, il bersaglio subisce 2d8 + 1d6 danni. Il tipo di danno è determinato dal risultato dei d8. Se entrambi i d8 mostrano lo stesso numero, l'energia balza su un altro bersaglio entro 9 metri.", "livelli_superiori": "Il danno aumenta di 1d6 per ogni livello dello slot sopra il 1º."}, {"id": "srd_cerchio_di_morte", "nome": "Cerchio di Morte", "livello": 6, "edizione": "2024", "scuola": "Necromanzia", "tempo_lancio": "1 azione", "gittata": "45 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": true}, "materiali": "la polvere di una perla nera frantumata del valore di almeno 500 mo", "classi": ["Mago", "Stregone", "Warlock"], "descrizione": "Un'energia negativa si sprigiona in una sfera del raggio di 18 metri centrata su un punto entro gittata. Ogni creatura nell'area deve effettuare un tiro salvezza su Costituzione, subendo 8d6 danni da necromanzia se lo fallisce, o la metà se lo supera.", "livelli_superiori": "Il danno aumenta di 2d6 per ogni livello dello slot sopra il 6º."}, {"id": "srd_cerchio_di_potere", "nome": "Cerchio di Potere", "livello": 5, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Personale (9 metri)", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Paladino"], "descrizione": "Un'energia divina si irradia dall'incantatore in un raggio di 9 metri. Per la durata, le creature non ostili nell'aura hanno vantaggio ai tiri salvezza contro gli incantesimi e altri effetti magici.", "livelli_superiori": ""}, {"id": "srd_cerchio_magico", "nome": "Cerchio Magico", "livello": 3, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 minuto", "gittata": "3 metri", "durata": "1 ora", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "acqua santa o polvere d'argento e ferro del valore di almeno 100 mo (consumata)", "classi": ["Chierico", "Mago", "Paladino", "Warlock"], "descrizione": "L'incantatore crea un cilindro di energia magica centrato su un punto a terra. Sceglie uno o più tipi di creature: celestiali, elementali, folletti, demoni o non morti. Il cerchio impedisce a tali creature di entrare, uscire o influenzare magicamente chi è all'interno.", "livelli_superiori": "La durata aumenta di 1 ora per ogni livello dello slot sopra il 3º."}, {"id": "srd_chiamare_fulmini", "nome": "Chiamare Fulmini", "livello": 3, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Druido"], "descrizione": "Una nube temporalesca appare nel cielo sopra un punto scelto dall'incantatore. Finché l'incantesimo non termina, l'incantatore può usare la sua azione per far cadere un fulmine dalla nube. Ogni creatura entro 1,5 metri dal punto colpito deve superare un tiro salvezza su Destrezza o subire 3d10 danni da fulmine.", "livelli_superiori": "Il danno aumenta di 1d10 per ogni livello dello slot sopra il 3º."}, {"id": "srd_chiaroveggenza", "nome": "Chiaroveggenza", "livello": 3, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "10 minuti", "gittata": "1,5 km", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un sensore focalizzatore del valore di almeno 100 mo (un corno di vetro o un occhio di vetro)", "classi": ["Bardo", "Chierico", "Mago"], "descrizione": "L'incantatore crea un sensore invisibile in un luogo a lui familiare o un luogo ovvio entro gittata. Può scegliere di vedere o di sentire attraverso il sensore come se si trovasse lì.", "livelli_superiori": ""}, {"id": "srd_comanda_vegetali", "nome": "Comanda Vegetali", "livello": 3, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "45 metri", "durata": "Istantanea o 8 ore", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Druido", "Ranger"], "descrizione": "L'incantatore infonde energia nelle piante in un'area. Può rendere il terreno difficile (le piante intralciano) o rendere le piante estremamente produttive per un anno se lanciato in 8 ore.", "livelli_superiori": ""}, {"id": "srd_comprendere_linguaggi", "nome": "Comprendere Linguaggi", "livello": 1, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 azione (rituale)", "gittata": "Personale", "durata": "1 ora", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di fuliggine e qualche granello di sale", "classi": ["Bardo", "Mago", "Warlock"], "descrizione": "Per la durata, l'incantatore comprende il significato letterale di ogni linguaggio parlato che sente e di ogni linguaggio scritto che vede (toccando la superficie su cui è scritto).", "livelli_superiori": ""}, {"id": "srd_comando", "nome": "Comando", "livello": 1, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "1 round", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Chierico", "Paladino"], "descrizione": "L'incantatore pronuncia un comando di una sola parola a una creatura che egli è in grado di vedere entro gittata. Il bersaglio deve superare un tiro salvezza su Saggezza, altrimenti dovrà obbedire al comando nel suo turno successivo. L'incantesimo non ha effetto se il bersaglio è un non morto, se non capisce il linguaggio dell'incantatore o se il comando è direttamente dannoso per esso.", "livelli_superiori": "L'incantatore può colpire una creatura aggiuntiva per ogni livello dello slot sopra il 1º."}, {"id": "srd_comunione", "nome": "Comunione", "livello": 5, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 minuto (rituale)", "gittata": "Personale", "durata": "1 minuto", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "incenso e una fiala di acqua santa", "classi": ["Chierico"], "descrizione": "L'incantatore entra in contatto con una divinità o un intermediario divino e può porre fino a tre domande a cui è possibile rispondere con un 'sì' o un 'no'. Le risposte ricevute sono corrette. Se l'incantatore lancia l'incantesimo più di una volta prima di aver completato un riposo lungo, c'è una probabilità cumulativa del 25% che riceva una risposta casuale.", "livelli_superiori": ""}, {"id": "srd_comunione_con_la_natura", "nome": "Comunione con la Natura", "livello": 5, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 minuto (rituale)", "gittata": "Personale", "durata": "Istantanea", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Druido", "Ranger"], "descrizione": "L'incantatore diventa un tutt'uno con la natura e ottiene conoscenze sul territorio circostante. All'aperto, l'incantesimo fornisce informazioni entro un raggio di 4,5 km (900 metri in grotte o sotterranei). Può apprendere la posizione di: specchi d'acqua, vegetazione, fauna, insediamenti o presenze di creature non naturali.", "livelli_superiori": ""}, {"id": "srd_confusione", "nome": "Confusione", "livello": 4, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "27 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "tre gusi di noce", "classi": ["Bardo", "Druido", "Mago", "Stregone"], "descrizione": "Questo incantesimo assale la mente delle creature, generando deliri e provocando azioni incontrollate. Ogni creatura in una sfera del raggio di 3 metri centrata su un punto deve superare un tiro salvezza su Saggezza. Una creatura influenzata deve tirare un d10 all'inizio di ogni suo turno per determinare il suo comportamento (se si muove, se attacca o se non fa nulla).", "livelli_superiori": "Il raggio della sfera aumenta di 1,5 metri per ogni livello dello slot sopra il 4º."}, {"id": "srd_congelare_sangue", "nome": "Congelare Sangue (Tocco Gelido)", "livello": 0, "edizione": "2024", "scuola": "Necromanzia", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "1 round", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Mago", "Stregone", "Warlock"], "descrizione": "L'incantatore crea una mano scheletrica e spettrale nello spazio di una creatura entro gittata. Effettua un attacco incantesimo a distanza: se colpisce, il bersaglio subisce 1d8 danni da necromanzia e non può recuperare punti ferita fino all'inizio del turno successivo dell'incantatore. Se colpisce un non morto, esso ha anche svantaggio ai tiri per colpire contro l'incantatore.", "livelli_superiori": "Il danno aumenta di 1d8 al 5º, 11º e 17º livello."}, {"id": "srd_conoscenza_delle_leggende", "nome": "Conoscenza delle Leggende", "livello": 5, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "10 minuti", "gittata": "Personale", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "incenso del valore di almeno 250 mo (consumato) e quattro strisce d'avorio del valore di almeno 50 mo l'una", "classi": ["Bardo", "Chierico", "Mago"], "descrizione": "L'incantatore richiama alla mente leggende riguardanti una persona, un oggetto o un luogo importante. Se l'oggetto della ricerca è di importanza leggendaria, l'incantatore apprende informazioni che possono includere racconti dimenticati o segreti nascosti.", "livelli_superiori": ""}, {"id": "srd_contagio", "nome": "Contagio", "livello": 5, "edizione": "2024", "scuola": "Necromanzia", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "7 giorni", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico", "Druido"], "descrizione": "L'incantatore tenta di colpire una creatura con una malattia terribile. Effettua un attacco incantesimo in mischia. Se colpisce, il bersaglio è avvelenato. Alla fine di ogni suo turno, deve effettuare un tiro salvezza su Costituzione. Dopo tre fallimenti, la malattia ha pieno effetto e il bersaglio subisce gli effetti di una patologia a scelta (es. Cecità, Febbre della Mente, ecc.) per la durata.", "livelli_superiori": ""}, {"id": "srd_controllare_acqua", "nome": "Controllare Acqua", "livello": 4, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "90 metri", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "una goccia d'acqua e un pizzico di polvere", "classi": ["Chierico", "Druido", "Mago"], "descrizione": "L'incantatore controlla una massa d'acqua entro un'area cubica di 30 metri di lato. Può scegliere uno dei seguenti effetti: Alzare l'Acqua, Spartire l'Acqua, Inondare o Deviare il Corso. Può cambiare l'effetto usando un'azione nel suo turno.", "livelli_superiori": ""}, {"id": "srd_controllare_tempo_atmosferico", "nome": "Controllare Tempo Atmosferico", "livello": 8, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "10 minuti", "gittata": "Personale (raggio di 7,5 km)", "durata": "Concentrazione, fino a 8 ore", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "incenso e terra mischiati con acqua", "classi": ["Chierico", "Druido", "Mago"], "descrizione": "L'incantatore cambia le condizioni atmosferiche all'aperto in un raggio di 7,5 km. Può modificare precipitazioni, temperatura e vento. Occorrono 1d4 x 10 minuti affinché le nuove condizioni si manifestino dopo ogni cambiamento.", "livelli_superiori": ""}, {"id": "srd_controincantesimo", "nome": "Controincantesimo", "livello": 3, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 reazione", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": false, "s": true, "m": false}, "materiali": "", "classi": ["Mago", "Stregone", "Warlock"], "descrizione": "L'incantatore tenta di interrompere una creatura nel processo di lancio di un incantesimo. Se la creatura sta lanciando un incantesimo di 3º livello o inferiore, l'incantesimo fallisce. Se è di 4º livello o superiore, l'incantatore effettua una prova della sua caratteristica da incantatore (CD 10 + livello dell'incantesimo).", "livelli_superiori": "L'incantesimo avversario fallisce automaticamente se il suo livello è pari o inferiore al livello dello slot usato per Controincantesimo."}, {"id": "srd_danza_irresistibile_di_otto", "nome": "Danza Irresistibile di Otto", "livello": 6, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Bardo", "Mago"], "descrizione": "L'incantatore sceglie una creatura entro gittata. Il bersaglio inizia a ballare vorticosamente sul posto, saltellando e battendo i piedi per la durata. La creatura danzante ha svantaggio ai tiri salvezza su Destrezza e ai tiri per colpire, e gli altri hanno vantaggio ai tiri per colpire contro di essa. Il bersaglio deve usare tutto il suo movimento per danzare senza allontanarsi.", "livelli_superiori": ""}, {"id": "srd_dardo_incantato", "nome": "Dardo Incantato", "livello": 1, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Mago", "Stregone"], "descrizione": "L'incantatore crea tre dardi di forza magica. Ogni dardo colpisce una creatura a sua scelta che egli sia in grado di vedere entro gittata. Un dardo infligge 1d4 + 1 danni da forza al bersaglio. I dardi colpiscono tutti simultaneamente e l'incantatore può dirigerli contro un unico bersaglio o contro bersagli diversi.", "livelli_superiori": "L'incantatore crea un dardo aggiuntivo per ogni livello dello slot sopra il 1º."}, {"id": "srd_dardo_tracciante", "nome": "Dardo Tracciante", "livello": 1, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "1 round", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico"], "descrizione": "Un dardo di luce scagliato contro una creatura entro gittata. Effettua un attacco incantesimo a distanza. Se colpisce, il bersaglio subisce 4d6 danni radiosi e il prossimo tiro per colpire effettuato contro questo bersaglio prima della fine del turno successivo dell'incantatore ha vantaggio grazie alla luce mistica che lo avvolge.", "livelli_superiori": "Il danno aumenta di 1d6 per ogni livello dello slot sopra il 1º."}, {"id": "srd_debolezza_mentale", "nome": "Debolezza Mentale", "livello": 8, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "45 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "una manciata di sferette di argilla, cristallo, vetro o minerale", "classi": ["Bardo", "Druido", "Mago", "Warlock"], "descrizione": "L'incantatore tenta di frantumare la mente di una creatura entro gittata. Il bersaglio subisce 4d6 danni psichici e deve effettuare un tiro salvezza su Intelligenza. Se lo fallisce, i suoi punteggi di Intelligenza e Carisma diventano 1. La creatura non può lanciare incantesimi, attivare oggetti magici o comprendere linguaggi, ma può proteggere i suoi amici.", "livelli_superiori": ""}, {"id": "srd_decifrare_scritto", "nome": "Decifrare Scritto (Comprendere Linguaggi)", "livello": 1, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 azione (rituale)", "gittata": "Personale", "durata": "1 ora", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di fuliggine e qualche granello di sale", "classi": ["Bardo", "Mago", "Warlock", "Ranger"], "descrizione": "L'incantatore comprende il significato letterale di ogni linguaggio parlato che sente. Inoltre, toccando una superficie su cui è riportato un testo scritto, ne comprende il significato letterale (un linguaggio alla volta).", "livelli_superiori": ""}, {"id": "srd_desiderio", "nome": "Desiderio", "livello": 9, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "Personale", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Mago", "Stregone"], "descrizione": "L'incantesimo più potente che un mortale possa lanciare. Semplicemente parlando, l'incantatore può alterare la realtà. L'uso base è replicare qualsiasi altro incantesimo di 8º livello o inferiore senza requisiti. Può essere usato per effetti più potenti (creare oggetti, curare ferite, ecc.), ma comporta un forte stress magico per l'incantatore.", "livelli_superiori": ""}, {"id": "srd_destriero_fantomatico", "nome": "Destriero Fantomatico", "livello": 3, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 minuto (rituale)", "gittata": "9 metri", "durata": "1 ora", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Mago"], "descrizione": "L'incantatore evoca una creatura quasi reale che ricorda un cavallo. La creatura ha CA 10, 7 punti ferita e una velocità di 30 metri. Può trasportare l'incantatore o una creatura a sua scelta. Quando l'incantesimo termina, il destriero svanisce gradualmente in 1 minuto.", "livelli_superiori": ""}, {"id": "srd_individuazione_del_bene_e_del_male", "nome": "Individuazione del Bene e del Male", "livello": 1, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 azione", "gittata": "Personale (9 metri)", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico", "Paladino"], "descrizione": "Per la durata, l'incantatore percepisce se entro 9 metri da lui è presente un celestiale, un elementale, un folletto, un demonio, un non morto o un'aberrazione, nonché la sua posizione. Percepisce inoltre la presenza di luoghi o oggetti consacrati o sconsacrati.", "livelli_superiori": ""}, {"id": "srd_dissolvi_magia", "nome": "Dissolvi Magia", "livello": 3, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Chierico", "Druido", "Mago", "Paladino", "Stregone", "Warlock"], "descrizione": "L'incantatore sceglie una creatura, un oggetto o un effetto magico entro gittata. Ogni incantesimo di 3º livello o inferiore attivo sul bersaglio termina. Per ogni incantesimo di 4º livello o superiore, l'incantatore effettua una prova della sua caratteristica da incantatore (CD 10 + livello dell'incantesimo).", "livelli_superiori": "Se lanciato con uno slot di livello superiore, interrompe automaticamente gli incantesimi di livello pari o inferiore a quello dello slot usato."}, {"id": "srd_dito_della_morte", "nome": "Dito della Morte", "livello": 7, "edizione": "2024", "scuola": "Necromanzia", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Mago", "Stregone", "Warlock"], "descrizione": "L'incantatore punta il dito verso una creatura entro gittata ed emette un'energia negativa lacerante. Il bersaglio deve effettuare un tiro salvezza su Costituzione: subisce 7d8 + 30 danni da necromanzia se lo fallisce, o la metà se lo supera. Se questo danno uccide il bersaglio, esso sorge all'inizio del turno successivo dell'incantatore come uno zombi sotto il suo controllo permanente.", "livelli_superiori": ""}, {"id": "srd_divinazione", "nome": "Divinazione", "livello": 4, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 azione (rituale)", "gittata": "Personale", "durata": "Istantanea", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "incenso e un'offerta sacra appropriata alla divinità del valore di almeno 25 mo (consumati)", "classi": ["Chierico"], "descrizione": "L'incantatore pone una domanda riguardante un obiettivo, un evento o un'attività specifica che avverrà entro i prossimi 7 giorni. Una divinità o un intermediario fornisce una risposta veritiera, che può essere una frase breve, un verso criptico o un presagio.", "livelli_superiori": ""}, {"id": "srd_dominare_bestie", "nome": "Dominare Bestie", "livello": 4, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Druido", "Ranger"], "descrizione": "L'incantatore tenta di assumere il controllo di una bestia entro gittata. Il bersaglio deve superare un tiro salvezza su Saggezza o essere affascinato. Finché è affascinato, l'incantatore ha un legame telepatico con essa e può impartirle comandi (nessun'azione richiesta). Se la bestia subisce danni, ripete il tiro salvezza.", "livelli_superiori": "La durata della concentrazione aumenta a 10 minuti al 5º livello, 1 ora al 6º livello e 8 ore al 7º livello o superiore."}, {"id": "srd_dominare_mostri", "nome": "Dominare Mostri", "livello": 8, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Mago", "Stregone", "Warlock"], "descrizione": "L'incantatore tenta di assumere il controllo di una creatura qualsiasi entro gittata. Il bersaglio deve superare un tiro salvezza su Saggezza con svantaggio se l'incantatore è in combattimento con esso. Funziona come Dominare Bestie, ma su ogni tipo di creatura.", "livelli_superiori": "Usando uno slot di 9º livello, la durata della concentrazione aumenta a 8 ore."}, {"id": "srd_dominare_persone", "nome": "Dominare Persone", "livello": 5, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "L'incantatore tenta di assumere il controllo di un umanoide entro gittata. Il bersaglio deve superare un tiro salvezza su Saggezza o essere affascinato. L'incantatore può impartire comandi telepatici. Se il bersaglio subisce danni, ripete il tiro salvezza.", "livelli_superiori": "La durata aumenta a 10 minuti al 6º livello, 1 ora al 7º e 8 ore all'8º livello o superiore."}, {"id": "srd_donum_vitae", "nome": "Donum Vitae (Parola Guaritrice)", "livello": 1, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione bonus", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Bardo", "Chierico", "Druido"], "descrizione": "Una creatura a scelta dell'incantatore, che egli sia in grado di vedere entro gittata, recupera un numero di punti ferita pari a 1d4 + il modificatore della caratteristica da incantatore. Questo incantesimo non ha effetto su non morti o costrutti.", "livelli_superiori": "Il recupero aumenta di 1d4 per ogni livello dello slot sopra il 1º."}, {"id": "srd_doppio_passo", "nome": "Doppio Passo (Passo Veloce)", "livello": 1, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "1 ora", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di sporcizia", "classi": ["Druido", "Ranger", "Mago"], "descrizione": "L'incantatore tocca una creatura. La velocità sul terreno del bersaglio aumenta di 3 metri fino al termine dell'incantesimo.", "livelli_superiori": "L'incantatore può colpire una creatura aggiuntiva per ogni livello dello slot sopra il 1º."}, {"id": "srd_duellare", "nome": "Duellare (Costrizione)", "livello": 1, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione bonus", "gittata": "9 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Paladino"], "descrizione": "L'incantatore sfida una creatura a duello. Il bersaglio deve effettuare un tiro salvezza su Saggezza. Se lo fallisce, è costretto a focalizzare la sua attenzione sull'incantatore: ha svantaggio ai tiri per colpire contro creature diverse dall'incantatore e deve effettuare un tiro salvezza su Saggezza ogni volta che tenta di muoversi in uno spazio che sia a più di 9 metri dall'incantatore.", "livelli_superiori": ""}, {"id": "srd_esilio", "nome": "Esilio", "livello": 4, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un oggetto sgradevole per il bersaglio", "classi": ["Chierico", "Mago", "Paladino", "Stregone", "Warlock"], "descrizione": "L'incantatore tenta di inviare una creatura in un altro piano di esistenza. Il bersaglio deve superare un tiro salvezza su Carisma o essere esiliato. Se la creatura è nativa del piano in cui si trova, viene inviata in un semipiano innocuo. Se è nativa di un altro piano, torna nel suo piano d'origine.", "livelli_superiori": "L'incantatore può colpire una creatura aggiuntiva per ogni livello dello slot sopra il 4º."}, {"id": "srd_esplosione_di_fuoco", "nome": "Esplosione di Fuoco (Dardo di Fuoco)", "livello": 0, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Mago", "Stregone"], "descrizione": "L'incantatore scaglia un dardo di fuoco contro una creatura o un oggetto entro gittata. Effettua un attacco incantesimo a distanza. Se colpisce, il bersaglio subisce 1d10 danni da fuoco. Un oggetto infiammabile colpito da questo incantesimo prende fuoco se non è indossato o trasportato.", "livelli_superiori": "Il danno aumenta di 1d10 al 5º, 11º e 17º livello."}, {"id": "srd_evoca_animali", "nome": "Evoca Animali", "livello": 3, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Druido", "Ranger"], "descrizione": "L'incantatore evoca degli spiriti naturali che assumono la forma di bestie. Può evocare: una bestia di GS 2, due bestie di GS 1, quattro bestie di GS 1/2 o otto bestie di GS 1/4. Le creature appaiono in spazi liberi entro gittata e obbediscono ai comandi verbali dell'incantatore.", "livelli_superiori": "Il numero di creature evocate raddoppia con uno slot di 5º livello, triplica al 7º e quadruplica al 9º."}, {"id": "srd_evoca_celestiale", "nome": "Evoca Celestiale", "livello": 7, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione", "gittata": "27 metri", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico"], "descrizione": "L'incantatore evoca uno spirito dai Piani Superiori che si manifesta come un pilastro di luce. Può scegliere tra Luce Curatrice (recupera 4d12 + mod. caratteristica PF) o Luce Ustionante (6d12 danni radiosi, TS Destrezza dimezza). Può muovere il cilindro di 9 metri ogni turno.", "livelli_superiori": "I danni e la guarigione aumentano di 1d12 per ogni livello dello slot sopra il 7º."}, {"id": "srd_evoca_creature_boschive", "nome": "Evoca Creature Boschive", "livello": 4, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione", "gittata": "Incantatore", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Druido", "Ranger"], "descrizione": "L'incantatore evoca spiriti della natura che assumono la forma di creature fatate (come satiri o ninfe). Le creature appaiono in spazi liberi e obbediscono ai comandi. Svaniscono quando i loro PF scendono a 0 o al termine dell'incantesimo.", "livelli_superiori": ""}, {"id": "srd_esplosione_solare", "nome": "Esplosione Solare", "livello": 8, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "45 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un frammento di pietra di sole", "classi": ["Chierico", "Druido", "Mago", "Stregone"], "descrizione": "Una luce solare radiosa esplode in una sfera di 18 metri di raggio. Ogni creatura nell'area deve effettuare un TS su Costituzione: subisce 12d6 danni radiosi e rimane accecata per 1 minuto se fallisce, o metà danni se riesce.", "livelli_superiori": ""}, {"id": "srd_estasiare", "nome": "Estasiare", "livello": 2, "edizione": "2024", "scuola": "Ammaliamento", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Warlock"], "descrizione": "L'incantatore tesse una serie di parole e gesti per distrarre le creature scelte. Ogni bersaglio deve superare un TS su Saggezza, altrimenti ha svantaggio alle prove di Saggezza (Percezione) per notare altre creature che non siano l'incantatore.", "livelli_superiori": ""}, {"id": "srd_fiamma_perenne", "nome": "Fiamma Perenne", "livello": 2, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Fino a quando non viene dissolto", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "polvere di rubino del valore di 50 mo (consumata)", "classi": ["Chierico", "Druido", "Mago"], "descrizione": "Una fiamma magica, simile a una torcia ma che non produce calore e non consuma ossigeno, scaturisce da un oggetto toccato. Produce luce intensa in un raggio di 6 metri e luce fioca per altri 6 metri.", "livelli_superiori": ""}, {"id": "srd_frantumare", "nome": "Frantumare", "livello": 2, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un frammento di mica", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "Un rumore assordante esplode in un punto scelto. Ogni creatura in una sfera di 3 metri effettua un TS su Costituzione: subisce 3d8 danni da tuono se fallisce, o la metà se riesce. I costrutti e gli oggetti hanno svantaggio al tiro.", "livelli_superiori": "I danni aumentano di 1d8 per ogni livello dello slot sopra il 2º."}, {"id": "srd_guardiano_della_fede", "nome": "Guardiano della Fede", "livello": 4, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "8 ore", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Chierico"], "descrizione": "Un guardiano spettrale di taglia Grande appare in uno spazio libero. Qualsiasi nemico si muova entro 3 metri da esso deve superare un TS su Destrezza o subire 20 danni radiosi (metà se supera). Il guardiano svanisce dopo aver inflitto 60 danni totali.", "livelli_superiori": ""}, {"id": "srd_guarigione", "nome": "Guarigione", "livello": 6, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Chierico", "Druido"], "descrizione": "L'incantatore infonde un'ondata di energia curativa in una creatura. Il bersaglio recupera 70 punti ferita. Questo incantesimo pone fine anche a cecità, sordità e a qualsiasi malattia che affligga il bersaglio.", "livelli_superiori": "La quantità di punti ferita recuperati aumenta di 10 per ogni livello dello slot sopra il 6º."}, {"id": "srd_individuazione_del_magico", "nome": "Individuazione del Magico", "livello": 1, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 azione o rituale", "gittata": "Incantatore (9 metri)", "durata": "Concentrazione, fino a 10 minuti", "rituale": true, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Chierico", "Druido", "Mago", "Paladino", "Ranger", "Stregone", "Warlock"], "descrizione": "L'incantatore percepisce la presenza di magia entro 9 metri. Può usare un'azione per vedere un'aura debole attorno a creature o oggetti magici e conoscere la loro scuola di magia. Può penetrare barriere comuni ma è bloccato da metallo o piombo.", "livelli_superiori": ""}, {"id": "srd_intimorire_infernale", "nome": "Intimorire Infernale", "livello": 1, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 reazione (subendo danni)", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Warlock"], "descrizione": "In risposta al subire danni, l'incantatore punta il dito contro l'aggressore, che viene avvolto da fiamme. Il bersaglio effettua un TS su Destrezza: subisce 2d10 danni da fuoco se fallisce, o la metà se riesce.", "livelli_superiori": "I danni aumentano di 1d10 per ogni livello dello slot sopra il 1º."}, {"id": "srd_identificare", "nome": "Identificare", "livello": 1, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 minuto (rituale)", "gittata": "Contatto", "durata": "Istantanea", "rituale": true, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "una perla del valore di almeno 100 mo e una piuma di gufo", "classi": ["Bardo", "Mago"], "descrizione": "L'incantatore tocca un oggetto per tutta la durata del lancio. Se si tratta di un oggetto magico, ne apprende le proprietà e come usarle, se richiede sintonia e quante cariche ha. Se tocca una creatura, apprende quali incantesimi la stanno influenzando.", "livelli_superiori": ""}, {"id": "srd_immagine_maggiore", "nome": "Immagine Maggiore", "livello": 3, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di lana", "classi": ["Bardo", "Mago", "Stregone", "Warlock"], "descrizione": "L'incantatore crea l'immagine di un oggetto, una creatura o un altro fenomeno visibile che non superi un cubo con spigolo di 6 metri. L'illusione include suoni, odori e calore. Se l'incantatore usa uno slot di 6º livello o superiore, l'incantesimo dura finché non viene dissolto senza richiedere concentrazione.", "livelli_superiori": ""}, {"id": "srd_immagine_silenziosa", "nome": "Immagine Silenziosa", "livello": 1, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 azione", "gittata": "18 metri", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di lana", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "L'incantatore crea l'immagine visiva di un oggetto, una creatura o un altro fenomeno che non superi un cubo con spigolo di 4,5 metri. L'illusione è puramente visiva e non include suoni o altri sensi.", "livelli_superiori": ""}, {"id": "srd_immagine_speculare", "nome": "Immagine Speculare", "livello": 2, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 azione", "gittata": "Personale", "durata": "1 minuto", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Mago", "Stregone", "Warlock"], "descrizione": "Tre duplicati illusori dell'incantatore appaiono nel suo spazio. Ogni volta che una creatura bersaglia l'incantatore con un attacco, deve tirare un d20 per determinare se l'attacco colpisce lui o uno dei duplicati. La CA di un duplicato è 10 + mod. Destrezza.", "livelli_superiori": ""}, {"id": "srd_impersonare", "nome": "Impersonare (Camuffare Sé Stesso)", "livello": 1, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 azione", "gittata": "Personale", "durata": "1 ora", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "L'incantatore cambia il proprio aspetto, inclusi vestiti e armi. Può apparire più alto o più basso di 30 cm, ma la struttura fisica deve rimanere simile. Una creatura può esaminare l'illusione con una prova di Intelligenza (Indagare) contro la CD dell'incantatore.", "livelli_superiori": ""}, {"id": "srd_incenerire", "nome": "Incenerire (Palla di Fuoco)", "livello": 3, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "45 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "una pallina di guano di pipistrello e dello zolfo", "classi": ["Mago", "Stregone"], "descrizione": "Un'esplosione di fiamme divampa in una sfera di 6 metri di raggio. Ogni creatura nell'area deve effettuare un tiro salvezza su Destrezza. Se lo fallisce, subisce 8d6 danni da fuoco, altrimenti la metà. Il fuoco si diffonde oltre gli angoli.", "livelli_superiori": "Il danno aumenta di 1d6 per ogni livello dello slot sopra il 3º."}, {"id": "srd_individuazione_dei_pensieri", "nome": "Individuazione dei Pensieri", "livello": 2, "edizione": "2024", "scuola": "Divinazione", "tempo_lancio": "1 azione", "gittata": "Personale", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "una moneta di rame", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "L'incantatore percepisce i pensieri superficiali delle creature entro 9 metri. Può tentare di sondare più a fondo nei pensieri di una creatura; il bersaglio deve effettuare un tiro salvezza su Saggezza. Se fallisce, l'incantatore apprende i suoi ragionamenti, le emozioni e ciò che la preoccupa.", "livelli_superiori": ""}, {"id": "srd_infuocare", "nome": "Infuocare (Mani Brucianti)", "livello": 1, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "Personale (cono di 4,5 metri)", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Mago", "Stregone"], "descrizione": "Un cono di fiamme scaturisce dalle mani dell'incantatore. Ogni creatura nell'area deve effettuare un tiro salvezza su Destrezza. Se lo fallisce, subisce 3d6 danni da fuoco, altrimenti la metà.", "livelli_superiori": "Il danno aumenta di 1d6 per ogni livello dello slot sopra il 1º."}, {"id": "srd_invisibilita", "nome": "Invisibilità", "livello": 2, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un ciglio avvolto nella gomma arabica", "classi": ["Bardo", "Mago", "Stregone", "Warlock"], "descrizione": "Una creatura toccata diventa invisibile. Tutto ciò che il bersaglio indossa o trasporta è invisibile finché rimane addosso a lui. L'incantesimo termina se il bersaglio attacca o lancia un incantesimo.", "livelli_superiori": "L'incantatore può rendere invisibile una creatura aggiuntiva per ogni livello dello slot sopra il 2º."}, {"id": "srd_lentezza", "nome": "Lentezza", "livello": 3, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "una goccia di melassa", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "L'incantatore altera il tempo per un massimo di sei creature in un cubo con spigolo di 12 metri. I bersagli devono superare un TS su Saggezza, altrimenti la loro velocità è dimezzata, hanno -2 alla CA e ai TS su Destrezza, e non possono usare reazioni. Possono effettuare un'unica azione o un'azione bonus nel loro turno, ma non entrambe.", "livelli_superiori": ""}, {"id": "srd_luci_danzanti", "nome": "Luci Danzanti", "livello": 0, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un frammento di fosforo", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "L'incantatore crea fino a quattro luci grandi come torce che fluttuano nell'aria. Può muoverle fino a 18 metri come azione bonus. Le luci possono apparire come torce, lanterne o sfere luminose, oppure possono essere fuse in un'unica forma vagamente umana di taglia Media[cite: 16].", "livelli_superiori": ""}, {"id": "srd_luce", "nome": "Luce", "livello": 0, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "1 ora", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": true}, "materiali": "una lucciola o del muschio fosforescente", "classi": ["Bardo", "Chierico", "Mago", "Stregone"], "descrizione": "L'incantatore tocca un oggetto non più grande di 3 metri. L'oggetto emette luce intensa in un raggio di 6 metri e luce fioca per altri 6 metri. Se l'oggetto viene coperto da qualcosa di opaco, la luce viene bloccata.", "livelli_superiori": ""}, {"id": "srd_mano_magica", "nome": "Mano Magica", "livello": 0, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione", "gittata": "9 metri", "durata": "1 minuto", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Mago", "Stregone", "Warlock"], "descrizione": "Una mano spettrale e fluttuante appare in un punto scelto. L'incantatore può usarla per manipolare oggetti, aprire porte non bloccate, o versare il contenuto di fiale. La mano non può attaccare né sollevare più di 4,5 kg.", "livelli_superiori": ""}, {"id": "srd_messaggio", "nome": "Messaggio", "livello": 0, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "1 round", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": true}, "materiali": "un breve pezzo di filo di rame", "classi": ["Bardo", "Mago", "Stregone"], "descrizione": "L'incantatore punta il dito verso una creatura e sussurra un messaggio. Il bersaglio sente il messaggio e può rispondere con un sussurro che solo l'incantatore sente. Può passare attraverso barriere magiche o materiali comuni se l'incantatore conosce il percorso.", "livelli_superiori": ""}, {"id": "srd_mimetismo", "nome": "Mimetismo (Passo Senza Tracce)", "livello": 2, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Personale (emanazione di 9 metri)", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "cenere di foglie di vischio bruciate e un rametto di abete", "classi": ["Druido", "Ranger"], "descrizione": "Un velo di ombre e silenzio avvolge l'incantatore e i suoi alleati. Ogni creatura scelta entro 9 metri ottiene un bonus di +10 alle prove di Destrezza (Furtività) e non può essere tracciata se non con mezzi magici. Non lascia impronte.", "livelli_superiori": ""}, {"id": "srd_muro_di_fuoco", "nome": "Muro di Fuoco", "livello": 4, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 1 minuto", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pezzetto di fosforo", "classi": ["Druido", "Mago", "Stregone"], "descrizione": "L'incantatore crea un muro di fiamme lungo fino a 18 metri o un anello di 6 metri di diametro. Una creatura che termina il turno entro 3 metri dal lato caldi subisce 5d8 danni da fuoco. Una creatura subisce lo stesso danno quando entra nel muro per la prima volta nel turno o vi termina il turno.", "livelli_superiori": "Il danno aumenta di 1d8 per ogni livello dello slot sopra il 4º."}, {"id": "srd_muro_di_forza", "nome": "Muro di Forza", "livello": 5, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un pizzico di polvere di diamante", "classi": ["Mago"], "descrizione": "L'incantatore crea una barriera invisibile di forza magica. Può essere una superficie piana (fino a dieci pannelli di 3 metri per lato) o una semisfera/cupola (raggio fino a 3 metri). Nulla può attraversare fisicamente il muro, che è immune a ogni danno.", "livelli_superiori": ""}, {"id": "srd_muro_di_pietra", "nome": "Muro di Pietra", "livello": 5, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 10 minuti", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "un blocco di granito", "classi": ["Druido", "Mago", "Stregone"], "descrizione": "L'incantatore crea un muro di pietra solida composto da dieci pannelli (3 metri per lato, spessore 15 cm). Ogni pannello ha CA 15 e 30 PF per ogni 2,5 cm di spessore. Se la concentrazione viene mantenuta per l'intera durata, il muro diventa permanente.", "livelli_superiori": ""}, {"id": "srd_nebbia_oscurante", "nome": "Nebbia Oscurante", "livello": 1, "edizione": "2024", "scuola": "Evocazione", "tempo_lancio": "1 azione", "gittata": "36 metri", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Druido", "Mago", "Ranger", "Stregone"], "descrizione": "L'incantatore crea una sfera di nebbia con raggio di 6 metri centrata su un punto. L'area è pesantemente oscurata. Un vento moderato (almeno 15 km/h) disperde la nebbia dopo 1 round.", "livelli_superiori": "Il raggio della nebbia aumenta di 6 metri per ogni livello dello slot sopra il 1º."}, {"id": "srd_onda_tonante", "nome": "Onda Tonante", "livello": 1, "edizione": "2024", "scuola": "Invocazione", "tempo_lancio": "1 azione", "gittata": "Personale (cubo di 4,5 metri)", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": true, "m": false}, "materiali": "", "classi": ["Bardo", "Druido", "Mago", "Stregone"], "descrizione": "Un'ondata di forza tonante si sprigiona dall'incantatore. Ogni creatura nel cubo deve effettuare un TS su Costituzione: subisce 2d8 danni da tuono e viene spinta 3 metri lontano se fallisce, o metà danni se riesce[cite: 667]. Gli oggetti non fissati vengono spinti automaticamente.", "livelli_superiori": "Il danno aumenta di 1d8 per ogni livello dello slot sopra il 1º."}, {"id": "srd_parola_guaritrice", "nome": "Parola Guaritrice", "livello": 1, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione bonus", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Bardo", "Chierico", "Druido"], "descrizione": "Una creatura a scelta entro gittata recupera un ammontare di punti ferita pari a 2d4 più il modificatore di caratteristica da incantatore[cite: 404]. L'incantesimo non ha effetto su non morti o costrutti.", "livelli_superiori": "La guarigione aumenta di 2d4 per ogni livello dello slot sopra il 1º[cite: 405]."}, {"id": "srd_parola_guaritrice_di_massa", "nome": "Parola Guaritrice di Massa", "livello": 3, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione bonus", "gittata": "18 metri", "durata": "Istantanea", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Bardo", "Chierico"], "descrizione": "Fino a sei creature a scelta entro gittata recuperano 2d4 punti ferita più il modificatore di caratteristica da incantatore[cite: 406]. Non ha effetto su non morti o costrutti.", "livelli_superiori": "La guarigione aumenta di 1d4 per ogni livello dello slot sopra il 3º."}, {"id": "srd_passo_veloce", "nome": "Passo Veloce (Passo d'Urto)", "livello": 1, "edizione": "2024", "scuola": "Trasmutazione", "tempo_lancio": "1 azione bonus", "gittata": "Personale", "durata": "1 round", "rituale": false, "concentrazione": false, "comp": {"v": true, "s": false, "m": false}, "materiali": "", "classi": ["Bardo", "Ranger", "Mago"], "descrizione": "La velocità dell'incantatore aumenta di 3 metri fino alla fine del turno corrente, e il movimento non provoca attacchi d'opportunità.", "livelli_superiori": ""}, {"id": "srd_pelle_coracea", "nome": "Pelle Coracea (Pelle di Pietra)", "livello": 4, "edizione": "2024", "scuola": "Abiurazione", "tempo_lancio": "1 azione", "gittata": "Contatto", "durata": "Concentrazione, fino a 1 ora", "rituale": false, "concentrazione": true, "comp": {"v": true, "s": true, "m": true}, "materiali": "polvere di diamante del valore di almeno 100 mo, consumata dall'incantesimo", "classi": ["Druido", "Ranger", "Mago", "Stregone"], "descrizione": "L'incantatore tocca una creatura consenziente. Fino al termine dell'incantesimo, la carne del bersaglio diventa dura come la pietra, e il bersaglio ha resistenza ai danni contundenti, perforanti e taglienti non magici.", "livelli_superiori": ""}, {"id": "srd_paura", "nome": "Paura", "livello": 3, "edizione": "2024", "scuola": "Illusione", "tempo_lancio": "1 azione", "gittata": "Personale (cono di 9 metri)", "durata": "Concentrazione, fino a 1 minut
