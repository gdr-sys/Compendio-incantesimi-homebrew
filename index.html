<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compendio Incantesimi Homebrew</title>
    <style>
        :root[data-theme="light"] {
            --primary: #8b0000; --bg: #f4ece1; --card-bg: #fffdfa;
            --text: #332b21; --accent: #bc9a70; --form-bg: #e9decb; --pin-bg: #d4c4a8;
        }
        :root[data-theme="dark"] {
            --primary: #ff4d4d; --bg: #1a1a1a; --card-bg: #2d2d2d;
            --text: #e0e0e0; --accent: #5d4a36; --form-bg: #3d3d3d; --pin-bg: #4a3f35;
        }
        body { font-family: 'Palatino', serif; background-color: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; scroll-behavior: smooth; }
        .container { max-width: 1200px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); margin-bottom: 25px; }
        
        /* Pannello Pin */
        .pin-panel { background: var(--pin-bg); padding: 15px; border-radius: 8px; border: 1px dashed var(--primary); margin-bottom: 20px; }
        .pin-tag { background: var(--card-bg); padding: 5px 12px; border-radius: 20px; margin: 4px; display: inline-block; border: 1px solid var(--primary); cursor: pointer; font-size: 0.85em; }

        /* Form e Input */
        .spell-form {
            background: var(--form-bg); padding: 25px; border-radius: 8px; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px;
        }
        .full-width { grid-column: 1 / -1; }
        input, select, textarea { padding: 10px; border: 1px solid var(--accent); border-radius: 4px; background: var(--card-bg); color: var(--text); font-family: inherit; }
        select[multiple] { height: 100px; }

        /* Filtri Avanzati */
        .filter-section { 
            background: var(--form-bg); padding: 15px; border-radius: 8px; margin-bottom: 25px;
            display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 15px; align-items: end;
        }
        .filter-label { font-size: 0.8em; font-weight: bold; margin-bottom: 5px; display: block; color: var(--primary); }

        /* Card */
        .spell-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .spell-card { background: var(--card-bg); border: 1px solid var(--accent); border-left: 8px solid var(--primary); padding: 20px; border-radius: 4px; position: relative; }
        .spell-img { width: 100%; height: 160px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; border: 1px solid var(--accent); }

        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 10px 15px; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; }

        @media print {
            body * { visibility: hidden; }
            #print-zone, #print-zone * { visibility: visible; }
            #print-zone {
                position: absolute; left: 0; top: 0; width: 100%;
                display: grid !important; grid-template-columns: repeat(3, 6.35cm); gap: 0.4cm; justify-content: center;
            }
            .print-card { width: 6.35cm; height: 8.89cm; border: 1px solid #000; padding: 10px; box-sizing: border-box; background: white !important; color: black !important; font-size: 8pt; overflow: hidden; }
        }
        #print-zone { display: none; }
    </style>
</head>
<body>

<div class="container no-print">
    <header>
        <h1>📖 Compendio Incantesimi Homebrew</h1>
        <button onclick="toggleTheme()" class="btn btn-main">🌓 Tema</button>
    </header>

    <!-- Sezione Pin (Preparati) -->
    <div class="pin-panel" id="pinPanel" style="display:none">
        <strong>📌 Incantesimi Preparati:</strong>
        <div id="pinnedContainer" style="margin-top:10px;"></div>
    </div>

    <!-- Modulo Creazione -->
    <section class="spell-form">
        <input type="hidden" id="editId">
        <input type="text" id="nameIta" placeholder="Nome Incantesimo (ITA)">
        
        <select id="level">
            <option value="0">Trucchetto</option>
            <script>for(let i=1;i<=9;i++) document.write(`<option value="${i}">${i}° Livello</option>`)</script>
        </select>

        <select id="school">
            <option>Abiurazione</option><option>Ammaliamento</option><option>Divinazione</option><option>Evocazione</option>
            <option>Illusione</option><option>Invocazione</option><option>Necromanzia</option><option>Trasmutazione</option>
        </select>

        <select id="castingTime">
            <option>1 azione</option><option>1 azione bonus</option><option>1 reazione</option><option>1 minuto</option><option>10 minuti</option>
        </select>

        <input type="text" id="duration" placeholder="Durata (es. 1 ora)">
        
        <div class="full-width">
            <label class="filter-label">Classi (Seleziona più voci con Ctrl/Cmd):</label>
            <select id="classesSelect" multiple style="width:100%"></select>
        </div>

        <textarea id="effectDesc" class="full-width" rows="3" placeholder="Descrizione..."></textarea>
        
        <div class="full-width">
            <label class="filter-label">Immagine:</label>
            <input type="file" id="imgInput" onchange="handleImg(event)" style="width:100%">
        </div>

        <button onclick="handleSubmit()" class="btn btn-main full-width" id="btnSave">📜 Salva Incantesimo</button>
    </section>

    <!-- Filtri Multipli Contemporanei -->
    <div class="filter-section">
        <div>
            <label class="filter-label">Cerca Nome:</label>
            <input type="text" id="searchBar" placeholder="🔍 Scrivi qui..." onkeyup="renderSpells()" style="width:100%">
        </div>
        <div>
            <label class="filter-label">Filtra Livelli (Multi):</label>
            <select id="filterLevel" multiple onchange="renderSpells()" style="width:100%; height:60px;">
                <option value="0">T</option>
                <script>for(let i=1;i<=9;i++) document.write(`<option value="${i}">${i}</option>`)</script>
            </select>
        </div>
        <div>
            <label class="filter-label">Filtra Classi (Multi):</label>
            <select id="filterClass" multiple onchange="renderSpells()" style="width:100%; height:60px;"></select>
        </div>
        <button onclick="generatePDF()" class="btn btn-main">🖨️ Stampa (<span id="printCount">0</span>)</button>
    </div>

    <div id="spellList" class="spell-grid"></div>
</div>

<div id="print-zone"></div>

<script>
    let spells = JSON.parse(localStorage.getItem('dnd_vFinal_spells')) || [];
    let pinnedIds = JSON.parse(localStorage.getItem('dnd_vFinal_pinned')) || [];
    let printQueue = [];
    let currentImg = "";
    let isEditing = false;

    const CLASS_LIST = ["Artificiere", "Bardo", "Chierico", "Druido", "Guerriero (E.K.)", "Ladro (A.T.)", "Mago", "Paladino", "Ranger", "Stregone", "Warlock"];

    function toggleTheme() {
        const root = document.documentElement;
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function handleImg(e) {
        let r = new FileReader();
        r.onload = () => currentImg = r.result;
        if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
    }

    function handleSubmit() {
        const id = isEditing ? parseInt(document.getElementById('editId').value) : Date.now();
        const s = {
            id,
            nameIta: document.getElementById('nameIta').value,
            level: document.getElementById('level').value,
            school: document.getElementById('school').value,
            castingTime: document.getElementById('castingTime').value,
            duration: document.getElementById('duration').value,
            classes: Array.from(document.getElementById('classesSelect').selectedOptions).map(o => o.value),
            desc: document.getElementById('effectDesc').value,
            image: currentImg
        };
        if(!s.nameIta) return alert("Inserisci il nome!");
        if(isEditing) { spells[spells.findIndex(x => x.id === id)] = s; } else { spells.push(s); }
        localStorage.setItem('dnd_vFinal_spells', JSON.stringify(spells));
        location.reload();
    }

    function togglePin(id) {
        pinnedIds = pinnedIds.includes(id) ? pinnedIds.filter(i => i !== id) : [...pinnedIds, id];
        localStorage.setItem('dnd_vFinal_pinned', JSON.stringify(pinnedIds));
        renderAll();
    }

    function togglePrint(id) {
        printQueue = printQueue.includes(id) ? printQueue.filter(i => i !== id) : [...printQueue, id];
        document.getElementById('printCount').innerText = printQueue.length;
        renderSpells();
    }

    function renderAll() { renderPinned(); renderSpells(); }

    function renderPinned() {
        const container = document.getElementById('pinnedContainer');
        const pinned = spells.filter(s => pinnedIds.includes(s.id));
        document.getElementById('pinPanel').style.display = pinned.length ? 'block' : 'none';
        container.innerHTML = pinned.map(s => `
            <span class="pin-tag" onclick="document.getElementById('spell-${s.id}').scrollIntoView()">
                ${s.nameIta} <small onclick="event.stopPropagation(); togglePin(${s.id})">×</small>
            </span>
        `).join('');
    }

    function renderSpells() {
        const list = document.getElementById('spellList');
        const search = document.getElementById('searchBar').value.toLowerCase();
        const selLevels = Array.from(document.getElementById('filterLevel').selectedOptions).map(o => o.value);
        const selClasses = Array.from(document.getElementById('filterClass').selectedOptions).map(o => o.value);

        list.innerHTML = '';
        spells.filter(s => {
            const mSearch = s.nameIta.toLowerCase().includes(search);
            const mLevel = selLevels.length === 0 || selLevels.includes(s.level);
            const mClass = selClasses.length === 0 || s.classes.some(c => selClasses.includes(c));
            return mSearch && mLevel && mClass;
        }).forEach(s => {
            const isP = pinnedIds.includes(s.id);
            const isPr = printQueue.includes(s.id);
            list.innerHTML += `
                <div class="spell-card" id="spell-${s.id}">
                    <button onclick="togglePin(${s.id})" style="position:absolute; top:10px; right:10px; background:none; border:none; cursor:pointer; font-size:1.2em;">${isP ? '📌' : '📍'}</button>
                    ${s.image ? `<img src="${s.image}" class="spell-img">` : ''}
                    <h3 style="margin:0; color:var(--primary);">${s.nameIta}</h3>
                    <div style="font-size:0.8em; margin:5px 0;"><b>Liv:</b> ${s.level == '0' ? 'T' : s.level} | <b>Scuola:</b> ${s.school}</div>
                    <p style="font-size:0.9em; white-space:pre-wrap;">${s.desc}</p>
                    <button class="btn btn-main" style="width:100%; background:${isPr ? '#c62828' : '#2e7d32'}" onclick="togglePrint(${s.id})">
                        ${isPr ? 'Rimuovi' : 'Stampa'}
                    </button>
                    <div style="margin-top:10px; display:flex; gap:5px;">
                        <button onclick="editSpell(${s.id})" class="btn" style="flex:1; background:#ff9800; color:white; padding:5px;">Edit</button>
                        <button onclick="deleteSpell(${s.id})" class="btn" style="flex:1; background:#f44336; color:white; padding:5px;">Del</button>
                    </div>
                </div>`;
        });
    }

    function editSpell(id) {
        const s = spells.find(x => x.id === id);
        isEditing = true;
        document.getElementById('editId').value = s.id;
        document.getElementById('nameIta').value = s.nameIta;
        document.getElementById('effectDesc').value = s.desc;
        document.getElementById('btnSave').innerText = "💾 Aggiorna";
        window.scrollTo(0,0);
    }

    function deleteSpell(id) { if(confirm("Eliminare?")) { spells = spells.filter(s => s.id !== id); localStorage.setItem('dnd_vFinal_spells', JSON.stringify(spells)); renderAll(); } }

    function generatePDF() {
        if(!printQueue.length) return alert("Seleziona incantesimi!");
        const zone = document.getElementById('print-zone');
        zone.innerHTML = printQueue.map(id => {
            const s = spells.find(x => x.id === id);
            return `<div class="print-card"><h3>${s.nameIta}</h3><p>Liv. ${s.level} | ${s.school}</p><p>${s.desc}</p></div>`;
        }).join('');
        window.print();
    }

    // Init
    const cSel = document.getElementById('classesSelect');
    const fClass = document.getElementById('filterClass');
    CLASS_LIST.forEach(c => { cSel.add(new Option(c, c)); fClass.add(new Option(c, c)); });
    renderAll();
</script>
</body>
</html>
